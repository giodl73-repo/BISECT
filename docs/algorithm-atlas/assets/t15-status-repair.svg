<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">T.15 status and repair lineage</title>
  <desc id="desc">Capacity clustering status flow from assignment through validation, repair, infeasible witness, or invalid export block.</desc>
  <defs>
    <style>
      .bg{fill:#fbfbf8}.box{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.good{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.warn{fill:#fff3cd;stroke:#c79300;stroke-width:2}.bad{fill:#ffe4e1;stroke:#b84a42;stroke-width:2}.hold{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker>
  </defs>
  <rect class="bg" width="960" height="420"/>
  <rect class="box" x="45" y="55" width="170" height="70" rx="8"/><text class="label" x="82" y="85">Assignment</text><text class="small" x="75" y="106">seeds + capacity</text>
  <rect class="box" x="285" y="55" width="170" height="70" rx="8"/><text class="label" x="333" y="85">Validate</text><text class="small" x="316" y="106">population + graph</text>
  <rect class="good" x="540" y="35" width="170" height="70" rx="8"/><text class="label" x="602" y="65">valid</text><text class="small" x="570" y="86">write sidecars</text>
  <rect class="warn" x="540" y="135" width="170" height="70" rx="8"/><text class="label" x="585" y="165">repairable</text><text class="small" x="564" y="186">bounded repair path</text>
  <rect class="good" x="765" y="135" width="150" height="70" rx="8"/><text class="label" x="805" y="165">repaired</text><text class="small" x="790" y="186">write lineage</text>
  <rect class="hold" x="285" y="250" width="170" height="70" rx="8"/><text class="label" x="333" y="280">infeasible</text><text class="small" x="310" y="301">emit witness summary</text>
  <rect class="bad" x="540" y="250" width="170" height="70" rx="8"/><text class="label" x="592" y="280">invalid</text><text class="small" x="575" y="301">block final export</text>
  <path class="arrow" d="M215 90 H285"/><path class="arrow" d="M455 90 C490 90 500 70 540 70"/><path class="arrow" d="M455 105 C500 125 505 170 540 170"/><path class="arrow" d="M710 170 H765"/><path class="arrow" d="M370 125 V250"/><path class="arrow" d="M455 285 H540"/>
  <text class="small" x="75" y="365">The status is part of the evidence. It controls whether packages contain a final plan, a repair lineage, or a witness instead.</text>
</svg>
