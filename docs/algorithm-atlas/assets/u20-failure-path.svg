<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">U.20 audit failure path</title>
  <desc id="desc">The verifier compares hash-bound artifacts and returns structured failure reasons when plan, context, profile, or lineage do not match.</desc>
  <rect width="920" height="360" fill="#fbfbf7"/>
  <text x="34" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2933">Verification is also a failure story</text>
  <g font-family="Arial, sans-serif" font-size="13" fill="#52616b">
    <rect x="54" y="94" width="166" height="72" rx="8" fill="#fff" stroke="#8795a1"/><text x="82" y="137">plan.rplan hash</text>
    <rect x="54" y="190" width="166" height="72" rx="8" fill="#fff" stroke="#8795a1"/><text x="74" y="233">context.rctx hash</text>
    <rect x="288" y="94" width="170" height="72" rx="8" fill="#fff" stroke="#8795a1"/><text x="320" y="137">certificate id</text>
    <rect x="288" y="190" width="170" height="72" rx="8" fill="#fff" stroke="#8795a1"/><text x="318" y="233">lineage schema</text>
    <path d="M230 130 L276 130" stroke="#52616b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M230 226 L276 226" stroke="#52616b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M468 130 L542 176" stroke="#52616b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M468 226 L542 184" stroke="#52616b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="560" y="126" width="150" height="104" rx="8" fill="#fff" stroke="#547a45" stroke-width="2"/>
    <text x="595" y="166" fill="#1f2933" font-weight="700">verifier</text>
    <text x="590" y="196">single decision</text>
    <path d="M722 178 L782 178" stroke="#52616b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="798" y="98" width="92" height="54" rx="8" fill="#eef7ee" stroke="#547a45"/><text x="820" y="131" fill="#547a45" font-weight="700">valid</text>
    <rect x="798" y="206" width="92" height="54" rx="8" fill="#fff1f1" stroke="#d64545"/><text x="813" y="239" fill="#d64545" font-weight="700">invalid</text>
    <path d="M710 196 C744 216 758 226 788 230" fill="none" stroke="#d64545" stroke-width="3" marker-end="url(#arrowRed)"/>
    <text x="548" y="290" fill="#d64545">negative fixtures exercise mismatch reasons</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#52616b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d64545"/>
    </marker>
  </defs>
</svg>
