<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">ApportionRegions prime fallback</title>
  <desc id="desc">Prime k falls back to a floor-ceil binary split; composite children then use their factors.</desc>
  <style>.bg{fill:#fbfbf8}.node{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.leaf{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.line{stroke:#596673;stroke-width:2}</style>
  <rect class="bg" width="960" height="390"/><text class="label" x="365" y="50">Example: k = 17 is prime</text>
  <rect class="node" x="420" y="75" width="110" height="42" rx="8"/><text class="small" x="456" y="101">17</text>
  <line class="line" x1="475" y1="117" x2="330" y2="175"/><line class="line" x1="475" y1="117" x2="620" y2="175"/>
  <rect class="node" x="285" y="175" width="90" height="42" rx="8"/><text class="small" x="322" y="201">8</text>
  <rect class="node" x="575" y="175" width="90" height="42" rx="8"/><text class="small" x="612" y="201">9</text>
  <line class="line" x1="330" y1="217" x2="275" y2="280"/><line class="line" x1="330" y1="217" x2="385" y2="280"/><line class="line" x1="620" y1="217" x2="565" y2="280"/><line class="line" x1="620" y1="217" x2="675" y2="280"/>
  <rect class="leaf" x="240" y="280" width="70" height="34" rx="8"/><rect class="leaf" x="350" y="280" width="70" height="34" rx="8"/><rect class="leaf" x="530" y="280" width="70" height="34" rx="8"/><rect class="leaf" x="640" y="280" width="70" height="34" rx="8"/>
  <text class="small" x="258" y="302">4</text><text class="small" x="368" y="302">4</text><text class="small" x="548" y="302">3</text><text class="small" x="658" y="302">3</text>
  <text class="small" x="250" y="350">Prime fallback is binary at the parent; children resume ordinary factor logic.</text>
</svg>
