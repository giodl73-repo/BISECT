<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">GeoSection caterpillar comparison</title>
  <desc id="desc">An unnormalized small split creates a caterpillar-like remainder; normalized scoring selects a more balanced top-level split.</desc>
  <style>.bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.state{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.smallSide{fill:#ffe4e1;stroke:#b84a42;stroke-width:3}.halfA{fill:#dbeafe;stroke:#2b5c9b;stroke-width:3}.halfB{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:3}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.cut{stroke:#b84a42;stroke-width:4}</style>
  <rect class="bg" width="960" height="390"/>
  <rect class="panel" x="45" y="55" width="400" height="270" rx="8"/><rect class="panel" x="515" y="55" width="400" height="270" rx="8"/>
  <text class="label" x="75" y="90">Raw edge cut can favor 1:(k-1)</text>
  <path class="state" d="M110 135 C180 95 300 105 365 155 C405 185 390 245 325 270 C240 305 130 270 95 210 C80 180 85 155 110 135 Z"/>
  <path class="smallSide" d="M110 135 C145 118 180 112 205 115 C190 150 188 190 205 230 C160 238 115 228 95 210 C80 180 85 155 110 135 Z"/>
  <text class="small" x="120" y="285">Short boundary, long leftover region.</text>
  <text class="label" x="545" y="90">GeoSection normalizes ratio cost</text>
  <path class="halfA" d="M580 135 C650 95 735 105 765 185 C700 200 645 230 605 270 C550 235 540 170 580 135 Z"/>
  <path class="halfB" d="M765 185 C815 195 870 205 855 245 C835 295 690 305 605 270 C645 230 700 200 765 185 Z"/>
  <line class="cut" x1="765" y1="185" x2="605" y2="270"/>
  <text class="small" x="560" y="285">Selected split reflects geometry after size correction.</text>
</svg>
