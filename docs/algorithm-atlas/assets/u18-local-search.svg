<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">U.18 local search overview</title>
  <desc id="desc">An audited starting plan is improved by a validity-preserving boundary move and repackaged.</desc>
  <style>.bg{fill:#fbfbf8}.box{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.plan{fill:#dbeafe;stroke:#2b5c9b;stroke-width:2}.move{fill:#fff3cd;stroke:#c79300;stroke-width:2}.pkg{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker></defs>
  <rect class="bg" width="960" height="360"/>
  <rect class="plan" x="75" y="105" width="165" height="95" rx="8"/><text class="label" x="115" y="140">starting</text><text class="small" x="115" y="162">RPLAN/RCTX</text><text class="small" x="112" y="181">valid plan</text>
  <rect class="move" x="315" y="105" width="165" height="95" rx="8"/><text class="label" x="360" y="140">evaluate</text><text class="small" x="340" y="162">boundary moves</text><text class="small" x="352" y="181">reject invalid</text>
  <rect class="box" x="555" y="105" width="165" height="95" rx="8"/><text class="label" x="604" y="140">accept</text><text class="small" x="590" y="162">first best valid</text><text class="small" x="586" y="181">improving move</text>
  <rect class="pkg" x="795" y="105" width="115" height="95" rx="8"/><text class="label" x="825" y="140">audit</text><text class="small" x="817" y="162">descendant</text><text class="small" x="826" y="181">package</text>
  <path class="arrow" d="M240 152 H315"/><path class="arrow" d="M480 152 H555"/><path class="arrow" d="M720 152 H795"/>
  <text class="small" x="280" y="280">U.18 moves through plan space; it does not create the first plan from scratch.</text>
</svg>
