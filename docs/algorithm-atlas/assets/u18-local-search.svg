<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">U.18 local search candidate move decision</title>
  <desc id="desc">Local search starts from a valid plan, evaluates boundary moves, rejects invalid candidates, accepts the first best valid improving move, and packages a descendant plan.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#162033}
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#64748b;stroke-width:1.5;rx:8}
      .h{font-size:24px;font-weight:700}.sub{font-size:14px;fill:#475569}
      .label{font-size:14px;font-weight:700}.small{font-size:12px;fill:#475569}.tiny{font-size:10px;fill:#475569}
      .mono{font-size:11px;font-family:Consolas,monospace;fill:#162033}
      .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .a{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.b{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.c{fill:#fef3c7;stroke:#b45309;stroke-width:2}
      .move{fill:#fce7f3;stroke:#be185d;stroke-width:2}.bad{fill:#fee2e2;stroke:#dc2626;stroke-width:1.8;rx:5}.good{fill:#ecfdf5;stroke:#059669;stroke-width:1.8;rx:5}.warn{fill:#fff7ed;stroke:#f97316;stroke-width:1.8;rx:5}.chip{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5;rx:5}.header{fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1120" height="620" class="bg"/>
  <text x="32" y="44" class="h">U.18 Local Search</text>
  <text x="32" y="68" class="sub">A descendant plan is created only by a deterministic improving move that preserves population and connectedness.</text>

  <rect x="32" y="96" width="290" height="254" class="panel"/>
  <text x="52" y="124" class="label">1. Start from an audited valid plan</text>
  <text x="52" y="146" class="small">Boundary units are the only move candidates.</text>
  <g transform="translate(76 174)">
    <rect class="a" x="0" y="0" width="46" height="46"/><rect class="a" x="46" y="0" width="46" height="46"/><rect class="b" x="92" y="0" width="46" height="46"/>
    <rect class="a" x="0" y="46" width="46" height="46"/><rect class="move" x="46" y="46" width="46" height="46"/><rect class="b" x="92" y="46" width="46" height="46"/>
    <rect class="c" x="0" y="92" width="46" height="46"/><rect class="c" x="46" y="92" width="46" height="46"/><rect class="b" x="92" y="92" width="46" height="46"/>
    <text x="63" y="73" class="tiny">u5</text>
  </g>
  <text x="52" y="330" class="small">u5 is on the A/B boundary and can be tested.</text>

  <path d="M336 218 H384" class="arrow"/>

  <rect x="398" y="96" width="346" height="254" class="panel"/>
  <text x="418" y="124" class="label">2. Candidate moves must pass all gates</text>
  <text x="418" y="146" class="small">Improvement alone is not enough.</text>
  <rect x="424" y="174" width="292" height="28" class="header"/>
  <text x="436" y="193" class="mono">move       pop   contig   edge   decision</text>
  <rect x="424" y="202" width="292" height="34" class="bad"/>
  <text x="436" y="224" class="mono">u4 A-&gt;B   pass  fail     -3     reject</text>
  <rect x="424" y="240" width="292" height="34" class="good"/>
  <text x="436" y="262" class="mono">u5 A-&gt;B   pass  pass     -2     accept</text>
  <rect x="424" y="278" width="292" height="34" class="bad"/>
  <text x="436" y="300" class="mono">u8 C-&gt;B   fail  pass     -4     reject</text>
  <text x="418" y="334" class="small">The accepted move is the first best valid improving candidate.</text>

  <path d="M758 218 H806" class="arrow"/>

  <rect x="820" y="96" width="268" height="254" class="panel"/>
  <text x="840" y="124" class="label">3. Descendant plan after one move</text>
  <text x="840" y="146" class="small">The moved unit changes color; validity remains visible.</text>
  <g transform="translate(874 174)">
    <rect class="a" x="0" y="0" width="46" height="46"/><rect class="a" x="46" y="0" width="46" height="46"/><rect class="b" x="92" y="0" width="46" height="46"/>
    <rect class="a" x="0" y="46" width="46" height="46"/><rect class="b" x="46" y="46" width="46" height="46"/><rect class="b" x="92" y="46" width="46" height="46"/>
    <rect class="c" x="0" y="92" width="46" height="46"/><rect class="c" x="46" y="92" width="46" height="46"/><rect class="b" x="92" y="92" width="46" height="46"/>
    <text x="63" y="73" class="tiny">u5</text>
  </g>
  <rect x="846" y="330" width="206" height="24" class="good"/>
  <text x="862" y="347" class="small">edge cut: 5 -> 3, status: improved</text>

  <rect x="32" y="392" width="344" height="162" class="panel"/>
  <text x="52" y="420" class="label">Transition evidence</text>
  <rect x="62" y="450" width="278" height="76" class="chip"/>
  <text x="82" y="474" class="mono">moves_evaluated: 3</text>
  <text x="82" y="496" class="mono">moves_accepted: 1</text>
  <text x="82" y="518" class="mono">accepted_move: u5 A-&gt;B</text>

  <rect x="412" y="392" width="312" height="162" class="panel"/>
  <text x="432" y="420" class="label">Claim boundary</text>
  <rect x="444" y="456" width="116" height="42" class="good"/><text x="468" y="481" class="small">improved</text>
  <rect x="584" y="456" width="116" height="42" class="warn"/><text x="604" y="481" class="small">no-op valid</text>
  <text x="432" y="532" class="small">U.18 claims a local validity-preserving move, not global optimality.</text>

  <rect x="760" y="392" width="328" height="162" class="panel"/>
  <text x="780" y="420" class="label">Downstream consequence</text>
  <text x="780" y="444" class="small">The package is a descendant of the audited starting plan.</text>
  <rect x="796" y="476" width="96" height="42" class="a" rx="5"/><text x="818" y="501" class="small">parent</text>
  <rect x="916" y="476" width="96" height="42" class="good"/><text x="936" y="501" class="small">summary</text>
  <rect x="1036" y="476" width="36" height="42" class="b" rx="5"/>
  <path d="M892 498 H916" class="arrow"/><path d="M1012 498 H1036" class="arrow"/>
  <text x="780" y="538" class="small">Reading rule: show rejected candidates and the exact validity gate they failed.</text>
</svg>
