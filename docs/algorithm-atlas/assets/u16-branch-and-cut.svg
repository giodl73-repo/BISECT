<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">U.16 branch-and-cut overview</title>
  <desc id="desc">BISECT turns graph constraints into an ILP, separates connectivity cuts, and packages solver evidence.</desc>
  <style>.bg{fill:#fbfbf8}.box{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.solver{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.cut{fill:#fff3cd;stroke:#c79300;stroke-width:2}.pkg{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker></defs>
  <rect class="bg" width="960" height="360"/>
  <rect class="box" x="55" y="105" width="150" height="90" rx="8"/><text class="label" x="93" y="140">graph</text><text class="small" x="82" y="162">population</text><text class="small" x="80" y="180">objective</text>
  <rect class="solver" x="270" y="105" width="155" height="90" rx="8"/><text class="label" x="315" y="140">ILP model</text><text class="small" x="298" y="162">assignment vars</text><text class="small" x="306" y="180">constraints</text>
  <rect class="cut" x="490" y="105" width="155" height="90" rx="8"/><text class="label" x="522" y="140">separation</text><text class="small" x="520" y="162">connectivity</text><text class="small" x="535" y="180">cuts</text>
  <rect class="solver" x="710" y="65" width="170" height="80" rx="8"/><text class="label" x="748" y="100">solve report</text><text class="small" x="740" y="122">status + bound/gap</text>
  <rect class="pkg" x="710" y="205" width="170" height="80" rx="8"/><text class="label" x="748" y="240">RPLAN fixed</text><text class="small" x="760" y="262">point package</text>
  <path class="arrow" d="M205 150 H270"/><path class="arrow" d="M425 150 H490"/><path class="arrow" d="M645 135 C685 115 685 105 710 105"/><path class="arrow" d="M645 165 C685 205 685 245 710 245"/><path class="arrow" d="M568 105 C548 70 500 65 475 105"/>
  <text class="small" x="350" y="290">Branch-and-cut is exact only when the report says the declared solve actually reached that status.</text>
</svg>
