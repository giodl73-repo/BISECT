<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AreaSection filters root allocations using population and land-area windows</title>
  <desc id="desc">A teaching figure with countable 2D block arrays showing that a population-balanced dense split can fail the land-area window, while feasible root allocations continue to partition search and recursion.</desc>
  <style>
    .bg{fill:#f7f5ef}
    .panel{fill:#fffdf8;stroke:#26323d;stroke-width:1.6}
    .label{font:700 17px Arial,sans-serif;fill:#17212b}
    .title{font:700 30px Arial,sans-serif;fill:#17212b}
    .small{font:14px Arial,sans-serif;fill:#52616b}
    .tiny{font:12px Arial,sans-serif;fill:#52616b}
    .mono{font:12px Consolas,monospace;fill:#17212b}
    .card{fill:#fff;stroke:#c7d0da;stroke-width:1.2}
    .cell{stroke:#fff;stroke-width:2}
    .dense{fill:#c84f47}
    .suburb{fill:#e8b45b}
    .rural{fill:#9ed8aa}
    .leftBad{fill:#c84f47}
    .rightBad{fill:#f8cec6}
    .leftOk{fill:#6fb982}
    .rightOk{fill:#dff3e6}
    .outlineBad{fill:none;stroke:#b6423c;stroke-width:3;stroke-dasharray:8 5}
    .outlineOk{fill:none;stroke:#25724d;stroke-width:3}
    .barBg{fill:#edf1f5;stroke:#aab4bf;stroke-width:1}
    .popBar{fill:#c84f47}
    .areaBar{fill:#2f7d4c}
    .window{fill:none;stroke:#25724d;stroke-width:2}
    .warn{fill:#fff1ed;stroke:#b6423c;stroke-width:1.5}
    .ok{fill:#eef8f0;stroke:#25724d;stroke-width:1.5}
    .tableHead{fill:#26323d}
    .tableLine{stroke:#d8dee5;stroke-width:1}
    .line{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#596673"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="46" y="54">AreaSection: population-balanced is not always area-reasonable</text>
  <text class="small" x="48" y="84">The candidate root split must pass population tolerance and a looser land-area window before BISECT spends search budget.</text>

  <rect class="panel" x="42" y="116" width="1196" height="554" rx="12"/>

  <!-- Legend and base state -->
  <g transform="translate(74 148)">
    <text class="label" x="0" y="0">1. Same block state, weighted two ways</text>
    <rect class="card" x="0" y="22" width="322" height="190" rx="9"/>
    <g transform="translate(22 50)">
      <!-- 4 x 4 block state: dense core left, suburbs middle, rural right -->
      <rect class="cell dense" x="0" y="0" width="34" height="34"/><rect class="cell dense" x="36" y="0" width="34" height="34"/><rect class="cell suburb" x="72" y="0" width="34" height="34"/><rect class="cell rural" x="108" y="0" width="34" height="34"/>
      <rect class="cell dense" x="0" y="36" width="34" height="34"/><rect class="cell dense" x="36" y="36" width="34" height="34"/><rect class="cell suburb" x="72" y="36" width="34" height="34"/><rect class="cell rural" x="108" y="36" width="34" height="34"/>
      <rect class="cell suburb" x="0" y="72" width="34" height="34"/><rect class="cell suburb" x="36" y="72" width="34" height="34"/><rect class="cell rural" x="72" y="72" width="34" height="34"/><rect class="cell rural" x="108" y="72" width="34" height="34"/>
      <rect class="cell suburb" x="0" y="108" width="34" height="34"/><rect class="cell rural" x="36" y="108" width="34" height="34"/><rect class="cell rural" x="72" y="108" width="34" height="34"/><rect class="cell rural" x="108" y="108" width="34" height="34"/>
    </g>
    <g transform="translate(190 58)">
      <rect class="dense" x="0" y="0" width="18" height="18"/><text class="tiny" x="28" y="14">dense: pop 10, area 1</text>
      <rect class="suburb" x="0" y="34" width="18" height="18"/><text class="tiny" x="28" y="48">suburb: pop 4, area 2</text>
      <rect class="rural" x="0" y="68" width="18" height="18"/><text class="tiny" x="28" y="82">rural: pop 1, area 6</text>
    </g>
    <text class="tiny" x="22" y="190">AreaSection keeps population tight but rejects extreme land-area footprints.</text>
  </g>

  <path class="line" d="M404 245 H464"/>

  <!-- Candidate splits -->
  <g transform="translate(478 148)">
    <text class="label" x="0" y="0">2. Candidate root allocations are checked</text>
    <g transform="translate(0 32)">
      <rect class="card" width="180" height="236" rx="9"/>
      <text class="label" x="18" y="28">1 / 7</text>
      <text class="tiny" x="18" y="48">dense core split</text>
      <g transform="translate(22 64) scale(0.72)">
        <rect class="cell leftBad" x="0" y="0" width="34" height="34"/><rect class="cell leftBad" x="36" y="0" width="34" height="34"/><rect class="cell rightBad" x="72" y="0" width="34" height="34"/><rect class="cell rightBad" x="108" y="0" width="34" height="34"/>
        <rect class="cell leftBad" x="0" y="36" width="34" height="34"/><rect class="cell leftBad" x="36" y="36" width="34" height="34"/><rect class="cell rightBad" x="72" y="36" width="34" height="34"/><rect class="cell rightBad" x="108" y="36" width="34" height="34"/>
        <rect class="cell rightBad" x="0" y="72" width="34" height="34"/><rect class="cell rightBad" x="36" y="72" width="34" height="34"/><rect class="cell rightBad" x="72" y="72" width="34" height="34"/><rect class="cell rightBad" x="108" y="72" width="34" height="34"/>
        <rect class="cell rightBad" x="0" y="108" width="34" height="34"/><rect class="cell rightBad" x="36" y="108" width="34" height="34"/><rect class="cell rightBad" x="72" y="108" width="34" height="34"/><rect class="cell rightBad" x="108" y="108" width="34" height="34"/>
        <rect class="outlineBad" x="-2" y="-2" width="74" height="74" rx="4"/>
      </g>
      <text class="tiny" x="18" y="186">pop: pass</text>
      <text class="tiny" x="18" y="206">area: fail, too tiny</text>
    </g>
    <g transform="translate(206 32)">
      <rect class="card" width="180" height="236" rx="9"/>
      <text class="label" x="18" y="28">3 / 5</text>
      <text class="tiny" x="18" y="48">mixed footprint</text>
      <g transform="translate(22 64) scale(0.72)">
        <rect class="cell leftOk" x="0" y="0" width="34" height="34"/><rect class="cell leftOk" x="36" y="0" width="34" height="34"/><rect class="cell leftOk" x="72" y="0" width="34" height="34"/><rect class="cell rightOk" x="108" y="0" width="34" height="34"/>
        <rect class="cell leftOk" x="0" y="36" width="34" height="34"/><rect class="cell leftOk" x="36" y="36" width="34" height="34"/><rect class="cell leftOk" x="72" y="36" width="34" height="34"/><rect class="cell rightOk" x="108" y="36" width="34" height="34"/>
        <rect class="cell leftOk" x="0" y="72" width="34" height="34"/><rect class="cell leftOk" x="36" y="72" width="34" height="34"/><rect class="cell rightOk" x="72" y="72" width="34" height="34"/><rect class="cell rightOk" x="108" y="72" width="34" height="34"/>
        <rect class="cell leftOk" x="0" y="108" width="34" height="34"/><rect class="cell rightOk" x="36" y="108" width="34" height="34"/><rect class="cell rightOk" x="72" y="108" width="34" height="34"/><rect class="cell rightOk" x="108" y="108" width="34" height="34"/>
        <path class="outlineOk" d="M-2 -2 H106 V70 H70 V106 H34 V142 H-2 Z"/>
      </g>
      <text class="tiny" x="18" y="186">pop: pass</text>
      <text class="tiny" x="18" y="206">area: pass, search</text>
    </g>
  </g>

  <path class="line" d="M868 245 H918"/>

  <!-- Decision consequence -->
  <g transform="translate(930 148)">
    <text class="label" x="0" y="0">3. Only feasible ratios enter search</text>
    <rect x="0" y="32" width="252" height="150" rx="8" fill="#ffffff" stroke="#d8dee5"/>
    <rect class="tableHead" x="0" y="32" width="252" height="32" rx="8"/>
    <text x="14" y="53" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">ratio</text>
    <text x="76" y="53" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">pop</text>
    <text x="128" y="53" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">area</text>
    <text x="184" y="53" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">action</text>
    <line class="tableLine" x1="0" y1="96" x2="252" y2="96"/>
    <line class="tableLine" x1="0" y1="128" x2="252" y2="128"/>
    <g font-family="Consolas, monospace" font-size="13" fill="#17212b">
      <text x="14" y="85">1:7</text><text x="78" y="85">ok</text><text x="130" y="85">fail</text><text x="184" y="85">skip</text>
      <text x="14" y="117">3:5</text><text x="78" y="117">ok</text><text x="130" y="117">ok</text><text x="184" y="117">run</text>
      <text x="14" y="149">4:4</text><text x="78" y="149">ok</text><text x="130" y="149">ok</text><text x="184" y="149">run</text>
    </g>

    <g transform="translate(0 220)">
      <text class="label" x="0" y="0">Workload consequence</text>
      <rect class="ok" x="0" y="20" width="252" height="84" rx="8"/>
      <text class="small" x="20" y="50">selected feasible root: 3 / 5</text>
      <text class="small" x="20" y="74">left child recurses to 3 districts</text>
      <text class="small" x="20" y="96">right child recurses to 5 districts</text>
    </g>
  </g>

  <!-- Bars across lower half -->
  <g transform="translate(86 430)">
    <text class="label" x="0" y="0">Window check for the skipped dense-core candidate</text>
    <text class="tiny" x="0" y="34">population share</text>
    <rect class="barBg" x="118" y="20" width="260" height="24" rx="5"/>
    <rect class="popBar" x="118" y="20" width="130" height="24" rx="5"/>
    <rect class="window" x="240" y="14" width="18" height="36" rx="4"/>
    <text class="tiny" x="398" y="38">passes tight population target</text>

    <text class="tiny" x="0" y="86">land-area share</text>
    <rect class="barBg" x="118" y="72" width="260" height="24" rx="5"/>
    <rect class="areaBar" x="118" y="72" width="26" height="24" rx="5"/>
    <rect class="window" x="198" y="66" width="104" height="36" rx="4"/>
    <text class="tiny" x="398" y="90">fails looser area window</text>
  </g>

  <rect x="74" y="702" width="1132" height="34" rx="10" fill="#26323d"/>
  <text x="100" y="724" font-family="Arial, sans-serif" font-size="15" fill="#fff">Reading rule: AreaSection tries root allocations only after population and land-area windows agree the split is feasible enough to search.</text>
</svg>
