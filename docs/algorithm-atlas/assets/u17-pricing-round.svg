<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">U.17 pricing round to master problem</title>
  <desc id="desc">Pricing generates district columns, reduced cost filters them, and the master selects a non-overlapping cover.</desc>
  <rect width="920" height="360" fill="#fbfbf7"/>
  <text x="34" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2933">One pricing round</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#1f2933">
    <text x="52" y="84" font-weight="700">candidate connected districts</text>
    <text x="372" y="84" font-weight="700">pricing filter</text>
    <text x="650" y="84" font-weight="700">set-partitioning master</text>
  </g>
  <g transform="translate(52 118)" font-family="Arial, sans-serif" font-size="13">
    <rect x="0" y="0" width="230" height="170" rx="8" fill="#fff" stroke="#8795a1"/>
    <rect x="22" y="28" width="58" height="44" fill="#5b8def"/><text x="92" y="55" fill="#52616b">C1 covers {0,1,2}</text>
    <rect x="22" y="86" width="58" height="44" fill="#72b47e"/><text x="92" y="113" fill="#52616b">C2 covers {3,4,5}</text>
    <rect x="22" y="144" width="58" height="18" fill="#f2b84b"/><text x="92" y="158" fill="#52616b">C3 overlaps C1</text>
  </g>
  <path d="M310 200 L356 200" stroke="#52616b" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(372 118)" font-family="Arial, sans-serif" font-size="13">
    <rect x="0" y="0" width="200" height="170" rx="8" fill="#fff" stroke="#8795a1"/>
    <text x="20" y="38" fill="#52616b">population feasible?</text>
    <text x="20" y="68" fill="#52616b">connected?</text>
    <text x="20" y="98" fill="#52616b">reduced cost useful?</text>
    <line x1="20" y1="118" x2="180" y2="118" stroke="#d5dadd"/>
    <text x="20" y="146" fill="#547a45" font-weight="700">keep C1, C2</text>
  </g>
  <path d="M594 200 L634 200" stroke="#52616b" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(650 106)" font-family="Arial, sans-serif" font-size="13">
    <rect x="0" y="0" width="220" height="198" rx="8" fill="#fff" stroke="#8795a1"/>
    <text x="18" y="34" font-weight="700" fill="#1f2933">choose columns</text>
    <text x="18" y="64" fill="#52616b">each unit covered once</text>
    <text x="18" y="92" fill="#52616b">no column overlap</text>
    <text x="18" y="120" fill="#52616b">minimize declared cost</text>
    <rect x="18" y="144" width="78" height="28" rx="4" fill="#5b8def"/><text x="57" y="163" text-anchor="middle" fill="white">C1</text>
    <rect x="110" y="144" width="78" height="28" rx="4" fill="#72b47e"/><text x="149" y="163" text-anchor="middle" fill="white">C2</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#52616b"/>
    </marker>
  </defs>
</svg>
