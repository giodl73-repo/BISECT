<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">AreaSection Lorenz feasibility filter</title>
  <desc id="desc">A population target must overlap the declared area window to be feasible.</desc>
  <style>.bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.axis{stroke:#2f3a45;stroke-width:2}.curve{fill:none;stroke:#2b5c9b;stroke-width:4}.window{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2;opacity:.65}.bad{fill:#ffe4e1;stroke:#b84a42;stroke-width:2;opacity:.75}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}</style>
  <rect class="bg" width="960" height="390"/><rect class="panel" x="60" y="45" width="840" height="285" rx="8"/>
  <text class="label" x="90" y="82">Feasibility before partition search</text>
  <line class="axis" x1="130" y1="270" x2="420" y2="270"/><line class="axis" x1="130" y1="270" x2="130" y2="105"/>
  <path class="curve" d="M130 270 C190 258 235 235 275 200 C325 155 365 125 420 105"/>
  <rect class="window" x="250" y="130" width="80" height="140"/><rect class="bad" x="360" y="210" width="35" height="60"/>
  <text class="small" x="190" y="300">cumulative area</text><text class="small" x="72" y="115">population</text>
  <text class="small" x="500" y="145">Green band: population target overlaps area window.</text>
  <text class="small" x="500" y="185">Red band: requested ratio cannot satisfy the declared window.</text>
  <text class="small" x="500" y="225">Skipped ratios should be recorded as evidence.</text>
</svg>
