<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">U.17 branch and price column master decision</title>
  <desc id="desc">Branch and price generates connected district columns, filters them, and the master selects non-overlapping columns that cover every unit exactly once.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#162033}
      .bg{fill:#f8fafc}
      .panel{fill:#fff;stroke:#64748b;stroke-width:1.5;rx:8}
      .h{font-size:24px;font-weight:700}
      .sub{font-size:14px;fill:#475569}
      .label{font-size:14px;font-weight:700}
      .small{font-size:12px;fill:#475569}
      .tiny{font-size:10px;fill:#475569}
      .mono{font-size:11px;font-family:Consolas,monospace;fill:#162033}
      .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .cell{fill:#f8fafc;stroke:#475569;stroke-width:1.4}
      .c1{fill:#dbeafe;stroke:#2563eb;stroke-width:2}
      .c2{fill:#dcfce7;stroke:#16a34a;stroke-width:2}
      .c3{fill:#fef3c7;stroke:#b45309;stroke-width:2}
      .bad{fill:#fee2e2;stroke:#dc2626;stroke-width:1.8;rx:5}
      .good{fill:#ecfdf5;stroke:#059669;stroke-width:1.8;rx:5}
      .warn{fill:#fff7ed;stroke:#f97316;stroke-width:1.8;rx:5}
      .chip{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5;rx:5}
      .header{fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1120" height="620" class="bg"/>
  <text x="32" y="44" class="h">U.17 Branch-And-Price</text>
  <text x="32" y="68" class="sub">Pricing creates whole-district columns; the master chooses a compatible exact cover, not unit moves one at a time.</text>

  <rect x="32" y="96" width="318" height="262" class="panel"/>
  <text x="52" y="124" class="label">1. Pricing generates candidate districts</text>
  <text x="52" y="146" class="small">Each column is connected and carries cost/provenance.</text>
  <g transform="translate(58 174)">
    <text x="0" y="-10" class="tiny">C1 covers {0,1,2}</text>
    <rect class="c1" x="0" y="0" width="42" height="42"/><rect class="c1" x="42" y="0" width="42" height="42"/><rect class="c1" x="84" y="0" width="42" height="42"/>
    <text x="160" y="28" class="small">pop 99, cost 8</text>
    <text x="0" y="70" class="tiny">C2 covers {3,4,5}</text>
    <rect class="c2" x="0" y="80" width="42" height="42"/><rect class="c2" x="42" y="80" width="42" height="42"/><rect class="c2" x="84" y="80" width="42" height="42"/>
    <text x="160" y="108" class="small">pop 100, cost 7.5</text>
    <text x="0" y="150" class="tiny">C3 covers {1,2,3}</text>
    <rect class="c3" x="42" y="160" width="42" height="42"/><rect class="c3" x="84" y="160" width="42" height="42"/><rect class="c3" x="126" y="160" width="42" height="42"/>
    <text x="190" y="188" class="small">cost 6</text>
  </g>

  <path d="M364 226 H412" class="arrow"/>

  <rect x="426" y="96" width="326" height="262" class="panel"/>
  <text x="446" y="124" class="label">2. Master checks exact cover, not just price</text>
  <text x="446" y="146" class="small">Cheap columns can lose if they overlap or leave gaps.</text>
  <rect x="452" y="172" width="268" height="28" class="header"/>
  <text x="464" y="191" class="mono">column  units      master reason</text>
  <rect x="452" y="200" width="268" height="34" class="good"/>
  <text x="464" y="222" class="mono">C1      0,1,2      selected</text>
  <rect x="452" y="238" width="268" height="34" class="good"/>
  <text x="464" y="260" class="mono">C2      3,4,5      selected</text>
  <rect x="452" y="276" width="268" height="34" class="bad"/>
  <text x="464" y="298" class="mono">C3      1,2,3      overlaps C1/C2</text>
  <rect x="452" y="314" width="268" height="24" class="warn"/>
  <text x="464" y="331" class="mono">C4      6,7        under target</text>

  <path d="M766 226 H814" class="arrow"/>

  <rect x="828" y="96" width="260" height="262" class="panel"/>
  <text x="848" y="124" class="label">3. Selected columns become a plan</text>
  <text x="848" y="146" class="small">Every unit must be covered exactly once.</text>
  <g transform="translate(862 180)">
    <rect class="c1" x="0" y="0" width="52" height="52"/><text x="21" y="31" class="tiny">0</text>
    <rect class="c1" x="52" y="0" width="52" height="52"/><text x="73" y="31" class="tiny">1</text>
    <rect class="c1" x="104" y="0" width="52" height="52"/><text x="125" y="31" class="tiny">2</text>
    <rect class="c2" x="0" y="52" width="52" height="52"/><text x="21" y="83" class="tiny">3</text>
    <rect class="c2" x="52" y="52" width="52" height="52"/><text x="73" y="83" class="tiny">4</text>
    <rect class="c2" x="104" y="52" width="52" height="52"/><text x="125" y="83" class="tiny">5</text>
  </g>
  <rect x="858" y="314" width="194" height="26" class="good"/>
  <text x="874" y="332" class="small">solution: selected_columns = [C1, C2]</text>

  <rect x="32" y="398" width="346" height="156" class="panel"/>
  <text x="52" y="426" class="label">Pricing lineage</text>
  <rect x="62" y="456" width="282" height="70" class="chip"/>
  <text x="82" y="480" class="mono">pricing_rounds: 1</text>
  <text x="82" y="502" class="mono">generated_columns: 4</text>
  <text x="82" y="524" class="mono">retained_columns: 3</text>

  <rect x="416" y="398" width="322" height="156" class="panel"/>
  <text x="436" y="426" class="label">Claim boundary</text>
  <rect x="446" y="462" width="118" height="44" class="good"/>
  <text x="470" y="488" class="small">enumerated exact</text>
  <rect x="586" y="462" width="118" height="44" class="warn"/>
  <text x="608" y="488" class="small">formulation-only</text>
  <text x="436" y="538" class="small">U.17 is exact only when the master report says the tiny/staged solve reached that status.</text>

  <rect x="776" y="398" width="312" height="156" class="panel"/>
  <text x="796" y="426" class="label">Downstream consequence</text>
  <rect x="808" y="466" width="82" height="42" class="good"/><text x="829" y="491" class="small">RPLAN</text>
  <rect x="910" y="466" width="82" height="42" class="chip"/><text x="927" y="491" class="small">lineage</text>
  <rect x="1012" y="466" width="54" height="42" class="warn"/><text x="1024" y="491" class="small">gap</text>
  <path d="M890 488 H910" class="arrow"/><path d="M992 488 H1012" class="arrow"/>
  <text x="796" y="538" class="small">Reading rule: show column coverage, overlap rejection, and selected column IDs.</text>
</svg>
