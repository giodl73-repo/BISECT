<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">U.17 branch-and-price overview</title>
  <desc id="desc">District columns are generated by pricing and selected by a master problem.</desc>
  <style>.bg{fill:#fbfbf8}.box{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.col{fill:#dbeafe;stroke:#2b5c9b;stroke-width:2}.master{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.pkg{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker></defs>
  <rect class="bg" width="960" height="360"/><rect class="box" x="55" y="90" width="165" height="105" rx="8"/><text class="label" x="98" y="130">graph</text><text class="small" x="82" y="155">district feasibility</text><text class="small" x="95" y="174">and costs</text>
  <rect class="col" x="305" y="55" width="135" height="70" rx="8"/><text class="label" x="343" y="85">column</text><text class="small" x="330" y="106">D = {u1,u2}</text>
  <rect class="col" x="305" y="145" width="135" height="70" rx="8"/><text class="label" x="343" y="175">column</text><text class="small" x="330" y="196">D = {u3,u4}</text>
  <rect class="col" x="305" y="235" width="135" height="70" rx="8"/><text class="label" x="343" y="265">column</text><text class="small" x="330" y="286">D = {u2,u3}</text>
  <rect class="master" x="555" y="105" width="160" height="100" rx="8"/><text class="label" x="585" y="140">master</text><text class="small" x="585" y="162">cover each unit</text><text class="small" x="598" y="181">exactly once</text>
  <rect class="pkg" x="795" y="105" width="120" height="100" rx="8"/><text class="label" x="825" y="140">RPLAN</text><text class="small" x="819" y="162">if solved</text><text class="small" x="817" y="181">or report</text>
  <path class="arrow" d="M220 142 C260 90 270 90 305 90"/><path class="arrow" d="M220 142 H305"/><path class="arrow" d="M220 142 C260 250 270 270 305 270"/><path class="arrow" d="M440 90 C500 100 515 130 555 140"/><path class="arrow" d="M440 180 H555"/><path class="arrow" d="M440 270 C500 240 515 185 555 175"/><path class="arrow" d="M715 155 H795"/>
</svg>
