<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">County-Sticky trade-off surface</title>
  <desc id="desc">Higher county multipliers can reduce county splits while increasing compactness cost.</desc>
  <style>.bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.axis{stroke:#2f3a45;stroke-width:2}.split{fill:none;stroke:#2f7d4c;stroke-width:4}.cost{fill:none;stroke:#b84a42;stroke-width:4}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}</style>
  <rect class="bg" width="960" height="390"/><rect class="panel" x="60" y="55" width="840" height="270" rx="8"/>
  <text class="label" x="90" y="92">Report both sides of the county multiplier</text>
  <line class="axis" x1="130" y1="275" x2="420" y2="275"/><line class="axis" x1="130" y1="275" x2="130" y2="105"/>
  <path class="split" d="M145 125 C210 145 280 190 400 250"/><path class="cost" d="M145 250 C220 240 310 210 400 140"/>
  <text class="small" x="190" y="305">alpha_county increases</text><text class="small" x="440" y="145">red: compactness / edge-cut cost</text><text class="small" x="440" y="185">green: county splits decrease</text>
  <text class="small" x="440" y="240">A good atlas page should not show only the green line.</text>
</svg>
