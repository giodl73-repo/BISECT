<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">T.14 Laplacian to Fiedler ordering</title>
  <desc id="desc">A unit graph becomes a Laplacian matrix, then a Fiedler coordinate, then a stable unit ordering.</desc>
  <defs>
    <style>
      .bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.node{fill:#e8f1ff;stroke:#2b5c9b;stroke-width:2}.edge{stroke:#778899;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.matrix{font:14px Consolas,monospace;fill:#17212b}.axis{stroke:#2f3a45;stroke-width:2}.bar{fill:#8bb7f0}.cut{stroke:#d14b4b;stroke-width:4}
    </style>
  </defs>
  <rect class="bg" width="960" height="420"/>
  <rect class="panel" x="30" y="40" width="250" height="320" rx="8"/>
  <rect class="panel" x="355" y="40" width="250" height="320" rx="8"/>
  <rect class="panel" x="680" y="40" width="250" height="320" rx="8"/>
  <text class="label" x="55" y="75">1. Unit adjacency graph</text>
  <line class="edge" x1="95" y1="140" x2="155" y2="105"/><line class="edge" x1="155" y1="105" x2="220" y2="145"/><line class="edge" x1="95" y1="140" x2="115" y2="215"/><line class="edge" x1="115" y1="215" x2="190" y2="245"/><line class="edge" x1="220" y1="145" x2="190" y2="245"/><line class="edge" x1="155" y1="105" x2="115" y2="215"/>
  <circle class="node" cx="95" cy="140" r="19"/><circle class="node" cx="155" cy="105" r="19"/><circle class="node" cx="220" cy="145" r="19"/><circle class="node" cx="115" cy="215" r="19"/><circle class="node" cx="190" cy="245" r="19"/>
  <text class="small" x="90" y="145">A</text><text class="small" x="150" y="110">B</text><text class="small" x="215" y="150">C</text><text class="small" x="110" y="220">D</text><text class="small" x="185" y="250">E</text>
  <text class="small" x="58" y="315">Edges and weights define the</text>
  <text class="small" x="58" y="333">induced graph for this split.</text>
  <text class="label" x="378" y="75">2. Laplacian and Fiedler vector</text>
  <text class="matrix" x="395" y="122">L = D - A</text>
  <text class="matrix" x="395" y="158">[ 2 -1  0 -1  0 ]</text>
  <text class="matrix" x="395" y="184">[-1  3 -1 -1  0 ]</text>
  <text class="matrix" x="395" y="210">[ 0 -1  2  0 -1 ]</text>
  <text class="matrix" x="395" y="236">[-1 -1  0  3 -1 ]</text>
  <text class="matrix" x="395" y="262">[ 0  0 -1 -1  2 ]</text>
  <text class="small" x="395" y="315">Second eigenvector gives one</text>
  <text class="small" x="395" y="333">coordinate per unit.</text>
  <text class="label" x="705" y="75">3. Stable spectral ordering</text>
  <line class="axis" x1="730" y1="230" x2="890" y2="230"/>
  <line class="cut" x1="812" y1="112" x2="812" y2="265"/>
  <rect class="bar" x="735" y="170" width="24" height="60"/><rect class="bar" x="765" y="135" width="24" height="95"/><rect class="bar" x="795" y="155" width="24" height="75"/><rect class="bar" x="825" y="122" width="24" height="108"/><rect class="bar" x="855" y="185" width="24" height="45"/>
  <text class="small" x="742" y="252">D</text><text class="small" x="772" y="252">A</text><text class="small" x="802" y="252">B</text><text class="small" x="832" y="252">E</text><text class="small" x="862" y="252">C</text>
  <text class="small" x="708" y="315">Sweep prefix cuts across this</text>
  <text class="small" x="708" y="333">ordered line and test balance.</text>
  <path d="M290 200 H340" stroke="#2f3a45" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M615 200 H665" stroke="#2f3a45" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2f3a45"/></marker></defs>
</svg>
