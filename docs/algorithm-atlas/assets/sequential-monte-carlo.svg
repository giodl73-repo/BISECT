<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Sequential Monte Carlo particle proposal weight and resampling</title>
  <desc id="desc">SMC particles propose districts, receive log weights, trigger resampling when ESS falls low, copy ancestors forward, and emit weighted completed plans.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#162033}
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#64748b;stroke-width:1.5;rx:8}
      .h{font-size:24px;font-weight:700}.sub{font-size:14px;fill:#475569}.label{font-size:14px;font-weight:700}.small{font-size:12px;fill:#475569}.tiny{font-size:10px;fill:#475569}.mono{font-size:11px;font-family:Consolas,monospace;fill:#162033}
      .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .p0{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.p1{fill:#fef3c7;stroke:#b45309;stroke-width:2}.p2{fill:#dcfce7;stroke:#16a34a;stroke-width:2}
      .good{fill:#ecfdf5;stroke:#059669;stroke-width:1.8;rx:5}.warn{fill:#fff7ed;stroke:#f97316;stroke-width:1.8;rx:5}.bad{fill:#fee2e2;stroke:#dc2626;stroke-width:1.8;rx:5}.chip{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5;rx:5}.header{fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1120" height="620" class="bg"/>
  <text x="32" y="44" class="h">Sequential Monte Carlo</text>
  <text x="32" y="68" class="sub">SMC grows weighted partial plans; when ESS drops, resampling copies high-weight ancestors and records genealogy.</text>

  <rect x="32" y="96" width="300" height="252" class="panel"/>
  <text x="52" y="124" class="label">1. Particles propose next districts</text>
  <text x="52" y="146" class="small">Each particle has a derived seed and partial plan.</text>
  <rect x="66" y="182" width="80" height="48" class="p0" rx="6"/><text x="88" y="211" class="small">p0</text>
  <rect x="66" y="246" width="80" height="48" class="p1" rx="6"/><text x="88" y="275" class="small">p1</text>
  <rect x="190" y="182" width="80" height="48" class="p2" rx="6"/><text x="212" y="211" class="small">p2</text>
  <rect x="190" y="246" width="80" height="48" class="bad" rx="6"/><text x="202" y="275" class="small">dead</text>
  <text x="52" y="330" class="small">Failed proposals remain visible as particle events.</text>

  <path d="M346 222 H394" class="arrow"/>

  <rect x="408" y="96" width="324" height="252" class="panel"/>
  <text x="428" y="124" class="label">2. Weight update and ESS check</text>
  <text x="428" y="146" class="small">Low ESS means the sample is concentrated.</text>
  <rect x="434" y="174" width="266" height="28" class="header"/>
  <text x="446" y="193" class="mono">particle proposal        log_w event</text>
  <rect x="434" y="202" width="266" height="32" class="good"/><text x="446" y="223" class="mono">p0       district A       -0.2 survives</text>
  <rect x="434" y="238" width="266" height="32" class="bad"/><text x="446" y="259" class="mono">p1       district B       -2.8 low</text>
  <rect x="434" y="274" width="266" height="32" class="good"/><text x="446" y="295" class="mono">p2       district C       -0.5 survives</text>
  <rect x="448" y="318" width="224" height="24" class="warn"/><text x="466" y="335" class="small">ESS = 1.7 &lt; threshold 2.0: resample</text>

  <path d="M746 222 H794" class="arrow"/>

  <rect x="808" y="96" width="280" height="252" class="panel"/>
  <text x="828" y="124" class="label">3. Resampling copies ancestors</text>
  <text x="828" y="146" class="small">Genealogy prevents copied particles from looking independent.</text>
  <rect x="846" y="180" width="76" height="44" class="p0" rx="6"/><text x="866" y="206" class="small">old p0</text>
  <rect x="846" y="244" width="76" height="44" class="p2" rx="6"/><text x="866" y="270" class="small">old p2</text>
  <rect x="974" y="162" width="76" height="38" class="p0" rx="6"/><text x="996" y="185" class="tiny">new p0</text>
  <rect x="974" y="210" width="76" height="38" class="p0" rx="6"/><text x="996" y="233" class="tiny">new p1</text>
  <rect x="974" y="258" width="76" height="38" class="p2" rx="6"/><text x="996" y="281" class="tiny">new p2</text>
  <path d="M922 202 H974" class="arrow"/><path d="M922 202 C948 206 952 226 974 226" class="arrow"/><path d="M922 266 H974" class="arrow"/>
  <rect x="846" y="316" width="204" height="24" class="chip"/><text x="862" y="333" class="small">ancestors: [0, 0, 2]</text>

  <rect x="32" y="392" width="342" height="158" class="panel"/>
  <text x="52" y="420" class="label">NDJSON event trail</text>
  <rect x="62" y="450" width="278" height="74" class="chip"/>
  <text x="82" y="474" class="mono">{type: particle, stage: 0, p: 1}</text>
  <text x="82" y="496" class="mono">{type: resample, ancestors:[0,0,2]}</text>
  <text x="82" y="518" class="mono">{type: complete, final_weight: ...}</text>

  <rect x="412" y="392" width="318" height="158" class="panel"/>
  <text x="432" y="420" class="label">Claim boundary</text>
  <rect x="446" y="458" width="110" height="44" class="good"/><text x="466" y="484" class="small">weighted</text>
  <rect x="582" y="458" width="110" height="44" class="bad"/><text x="594" y="484" class="small">all killed</text>
  <text x="432" y="534" class="small">SMC claims a sample under this proposal, not equal likelihood of every path.</text>

  <rect x="768" y="392" width="320" height="158" class="panel"/>
  <text x="788" y="420" class="label">Downstream consequence</text>
  <text x="788" y="444" class="small">Completed particles become weighted plans with reproducible seeds.</text>
  <rect x="806" y="476" width="78" height="42" class="p0" rx="5"/><text x="824" y="501" class="small">plan</text>
  <rect x="906" y="476" width="78" height="42" class="warn"/><text x="920" y="501" class="small">weight</text>
  <rect x="1006" y="476" width="58" height="42" class="chip"/><text x="1018" y="501" class="small">seed</text>
  <path d="M884 498 H906" class="arrow"/><path d="M984 498 H1006" class="arrow"/>
  <text x="788" y="536" class="small">Reading rule: show proposal status, ESS trigger, ancestor map, and final weights.</text>
</svg>
