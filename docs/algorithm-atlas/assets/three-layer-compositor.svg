<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Three-Layer Compositor keeps structure, weights, and search choices independent</title>
  <desc id="desc">A teaching figure showing candidate choices in the structure, weights, and search layers, the selected run recipe, and the manifest and sidecars produced by that resolved configuration.</desc>
  <style>
    .bg{fill:#f7f5ef}
    .panel{fill:#fffdf8;stroke:#26323d;stroke-width:1.6}
    .card{fill:#fff;stroke:#c7d0da;stroke-width:1.2}
    .title{font:700 30px Arial,sans-serif;fill:#17212b}
    .label{font:700 17px Arial,sans-serif;fill:#17212b}
    .small{font:14px Arial,sans-serif;fill:#52616b}
    .tiny{font:12px Arial,sans-serif;fill:#52616b}
    .mono{font:12px Consolas,monospace;fill:#17212b}
    .structure{fill:#dbeafe;stroke:#245b99;stroke-width:1.5}
    .weights{fill:#fff3cd;stroke:#c79300;stroke-width:1.5}
    .search{fill:#e4f5eb;stroke:#25724d;stroke-width:1.5}
    .selected{stroke:#26323d;stroke-width:3}
    .manifest{fill:#eef2ff;stroke:#5b61b6;stroke-width:1.5}
    .warn{fill:#fff1ed;stroke:#b6423c;stroke-width:1.5}
    .ok{fill:#eef8f0;stroke:#25724d;stroke-width:1.5}
    .line{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .hash{fill:#ffffff;stroke:#9aa7b3;stroke-width:1}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#596673"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="46" y="54">Three-Layer Compositor: one clean run recipe, three independent choices</text>
  <text class="small" x="48" y="84">The compositor exists so a comparison can change structure, weights, or search without silently changing the other layers.</text>

  <rect class="panel" x="42" y="116" width="1196" height="554" rx="12"/>

  <!-- Candidate layers -->
  <g transform="translate(76 150)">
    <text class="label" x="0" y="0">1. Candidate choices by layer</text>
    <rect class="card" x="0" y="28" width="322" height="370" rx="9"/>

    <text class="label" x="22" y="62">Structure</text>
    <rect class="structure" x="22" y="78" width="132" height="36" rx="6"/><text class="tiny" x="42" y="101">prime-factor</text>
    <rect class="structure selected" x="168" y="78" width="132" height="36" rx="6"/><text class="tiny" x="188" y="101">ratio-optimal-area</text>
    <rect class="structure" x="22" y="122" width="132" height="36" rx="6"/><text class="tiny" x="42" y="145">spectral</text>

    <text class="label" x="22" y="198">Weights</text>
    <rect class="weights selected" x="22" y="214" width="132" height="36" rx="6"/><text class="tiny" x="64" y="237">county</text>
    <rect class="weights" x="168" y="214" width="132" height="36" rx="6"/><text class="tiny" x="208" y="237">length</text>
    <rect class="weights" x="22" y="258" width="132" height="36" rx="6"/><text class="tiny" x="52" y="281">population</text>

    <text class="label" x="22" y="334">Search</text>
    <rect class="search selected" x="22" y="350" width="132" height="36" rx="6"/><text class="tiny" x="50" y="373">convergence</text>
    <rect class="search" x="168" y="350" width="132" height="36" rx="6"/><text class="tiny" x="204" y="373">percentile</text>
  </g>

  <path class="line" d="M410 342 H478"/>

  <!-- Resolved recipe -->
  <g transform="translate(500 150)">
    <text class="label" x="0" y="0">2. Resolved run recipe</text>
    <rect class="card" x="0" y="28" width="300" height="370" rx="9"/>
    <text class="mono" x="24" y="72">structure: ratio-optimal-area</text>
    <text class="mono" x="24" y="104">weights: county</text>
    <text class="mono" x="24" y="136">alpha_county: 3.0</text>
    <text class="mono" x="24" y="168">search: convergence</text>
    <text class="mono" x="24" y="200">threshold: 600</text>
    <rect class="hash" x="24" y="244" width="250" height="56" rx="8"/>
    <text class="small" x="42" y="268">config hash changes if any</text>
    <text class="small" x="42" y="290">selected layer changes</text>
    <rect class="ok" x="24" y="324" width="250" height="46" rx="8"/>
    <text class="small" x="42" y="352">one recipe, one reproducible run</text>
  </g>

  <path class="line" d="M812 342 H878"/>

  <!-- Consequence -->
  <g transform="translate(900 150)">
    <text class="label" x="0" y="0">3. Evidence says which layer did what</text>
    <rect class="card" x="0" y="28" width="286" height="370" rx="9"/>
    <rect class="manifest" x="24" y="60" width="238" height="56" rx="8"/>
    <text class="label" x="52" y="94">manifest.json</text>
    <rect class="structure" x="24" y="146" width="238" height="40" rx="7"/><text class="small" x="48" y="171">ratio-scan sidecar</text>
    <rect class="weights" x="24" y="202" width="238" height="40" rx="7"/><text class="small" x="48" y="227">weight-summary sidecar</text>
    <rect class="search" x="24" y="258" width="238" height="40" rx="7"/><text class="small" x="48" y="283">seed-search sidecar</text>
    <rect class="manifest" x="24" y="322" width="238" height="40" rx="7"/><text class="small" x="48" y="347">RPLAN package if final</text>
  </g>

  <!-- Comparison guardrail -->
  <g transform="translate(92 586)">
    <rect class="warn" x="0" y="0" width="510" height="58" rx="9"/>
    <text class="small" x="22" y="24">Bad comparison: change structure, weights, and search, then claim the structure caused the result.</text>
    <text class="small" x="22" y="46">The compositor exists to prevent that kind of muddy experiment.</text>
  </g>
  <g transform="translate(660 586)">
    <rect class="ok" x="0" y="0" width="510" height="58" rx="9"/>
    <text class="small" x="22" y="24">Clean comparison: change one selected layer and keep the other two fixed.</text>
    <text class="small" x="22" y="46">The manifest and sidecars make that isolation reviewable.</text>
  </g>

  <rect x="74" y="702" width="1132" height="34" rx="10" fill="#26323d"/>
  <text x="100" y="724" font-family="Arial, sans-serif" font-size="15" fill="#fff">Reading rule: the compositor chooses one option from each layer, hashes the resolved recipe, and emits sidecars that show which layer produced each piece of evidence.</text>
</svg>
