<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">U.17 pricing columns into master problem</title>
  <desc id="desc">Pricing rounds create district columns; the master selects a compatible covering set.</desc>
  <style>.bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.header{fill:#e9eef5}.chosen{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.row{fill:#fff;stroke:#ccd4dc}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.mono{font:12px Consolas,monospace;fill:#17212b}</style>
  <rect class="bg" width="960" height="390"/><rect class="panel" x="45" y="45" width="410" height="285" rx="8"/><rect class="panel" x="520" y="45" width="365" height="285" rx="8"/>
  <text class="label" x="75" y="82">Generated district columns</text>
  <rect class="header" x="75" y="105" width="330" height="32"/><text class="mono" x="88" y="126">id     units       pop   cost</text>
  <rect class="chosen" x="75" y="137" width="330" height="32"/><text class="mono" x="88" y="158">C01    1,2,3       99    4</text>
  <rect class="row" x="75" y="169" width="330" height="32"/><text class="mono" x="88" y="190">C02    2,3,4       101   5</text>
  <rect class="chosen" x="75" y="201" width="330" height="32"/><text class="mono" x="88" y="222">C03    4,5,6       100   3</text>
  <rect class="row" x="75" y="233" width="330" height="32"/><text class="mono" x="88" y="254">C04    1,5,6       97    8</text>
  <text class="small" x="75" y="300">Columns are whole candidate districts, not single unit decisions.</text>
  <text class="label" x="555" y="82">Master covering check</text>
  <text class="mono" x="555" y="122">choose C01 + C03</text>
  <text class="mono" x="555" y="154">unit 1: covered once</text>
  <text class="mono" x="555" y="182">unit 2: covered once</text>
  <text class="mono" x="555" y="210">unit 3: covered once</text>
  <text class="mono" x="555" y="238">unit 4,5,6: covered once</text>
  <text class="small" x="555" y="300">A solved tiny master can export a final audited plan.</text>
</svg>
