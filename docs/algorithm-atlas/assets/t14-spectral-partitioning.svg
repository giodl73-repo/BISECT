<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">T.14 spectral partitioning turns graph coordinates into sweep-cut candidates</title>
  <desc id="desc">A teaching figure showing a graph, Fiedler ordering, candidate sweep cuts, the selected balanced cut, and the recursive/audit consequence.</desc>
  <style>
    .bg{fill:#f7f5ef}
    .panel{fill:#fffdf8;stroke:#26323d;stroke-width:1.6}
    .card{fill:#fff;stroke:#c7d0da;stroke-width:1.2}
    .title{font:700 30px Arial,sans-serif;fill:#17212b}
    .label{font:700 17px Arial,sans-serif;fill:#17212b}
    .small{font:14px Arial,sans-serif;fill:#52616b}
    .tiny{font:12px Arial,sans-serif;fill:#52616b}
    .mono{font:12px Consolas,monospace;fill:#17212b}
    .edge{stroke:#64748b;stroke-width:2}
    .node{stroke:#334155;stroke-width:1.5}
    .a{fill:#dbeafe}
    .b{fill:#dcfce7}
    .unit{fill:#eef2ff;stroke:#5b61b6;stroke-width:1.5}
    .candidate{stroke:#f2b84b;stroke-width:3;stroke-dasharray:6 5}
    .chosen{stroke:#b6423c;stroke-width:5}
    .tableHead{fill:#26323d}
    .tableLine{stroke:#d8dee5;stroke-width:1}
    .ok{fill:#eef8f0;stroke:#25724d;stroke-width:1.5}
    .warn{fill:#fff1ed;stroke:#b6423c;stroke-width:1.5}
    .manifest{fill:#eef2ff;stroke:#5b61b6;stroke-width:1.5}
    .line{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#596673"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="46" y="54">T.14 Spectral Partitioning: graph geometry becomes sweep-cut candidates</text>
  <text class="small" x="48" y="84">The Fiedler vector orders units; BISECT sweeps candidate prefix cuts and selects the deterministic balanced cut.</text>

  <rect class="panel" x="42" y="116" width="1196" height="554" rx="12"/>

  <!-- Graph -->
  <g transform="translate(76 150)">
    <text class="label" x="0" y="0">1. Input graph</text>
    <rect class="card" x="0" y="28" width="220" height="220" rx="9"/>
    <g transform="translate(34 62)">
      <line class="edge" x1="24" y1="32" x2="76" y2="18"/><line class="edge" x1="76" y1="18" x2="126" y2="42"/><line class="edge" x1="126" y1="42" x2="132" y2="104"/><line class="edge" x1="132" y1="104" x2="78" y2="128"/><line class="edge" x1="78" y1="128" x2="24" y2="98"/><line class="edge" x1="24" y1="98" x2="24" y2="32"/><line class="edge" x1="76" y1="18" x2="78" y2="128"/>
      <circle class="node a" cx="24" cy="32" r="14"/><circle class="node a" cx="76" cy="18" r="14"/><circle class="node a" cx="126" cy="42" r="14"/>
      <circle class="node b" cx="132" cy="104" r="14"/><circle class="node b" cx="78" cy="128" r="14"/><circle class="node b" cx="24" cy="98" r="14"/>
    </g>
    <text class="tiny" x="24" y="216">Adjacency determines the Laplacian.</text>
  </g>

  <path class="line" d="M308 260 H374"/>

  <!-- Ordering -->
  <g transform="translate(392 150)">
    <text class="label" x="0" y="0">2. Fiedler ordering creates candidates</text>
    <rect class="card" x="0" y="28" width="370" height="220" rx="9"/>
    <text class="mono" x="24" y="62">coordinates: -0.8 -0.5 -0.1 | 0.2 0.6 0.9</text>
    <g transform="translate(28 100)">
      <rect class="unit" x="0" y="0" width="44" height="60" rx="6"/><rect class="unit" x="52" y="0" width="44" height="60" rx="6"/><rect class="unit" x="104" y="0" width="44" height="60" rx="6"/><rect class="unit" x="156" y="0" width="44" height="60" rx="6"/><rect class="unit" x="208" y="0" width="44" height="60" rx="6"/><rect class="unit" x="260" y="0" width="44" height="60" rx="6"/>
      <text class="tiny" x="13" y="36">u1</text><text class="tiny" x="65" y="36">u2</text><text class="tiny" x="117" y="36">u3</text><text class="tiny" x="169" y="36">u4</text><text class="tiny" x="221" y="36">u5</text><text class="tiny" x="273" y="36">u6</text>
      <line class="candidate" x1="101" y1="-18" x2="101" y2="78"/>
      <line class="chosen" x1="153" y1="-18" x2="153" y2="78"/>
      <line class="candidate" x1="205" y1="-18" x2="205" y2="78"/>
    </g>
    <text class="tiny" x="28" y="196">Every prefix cut is a candidate if population tolerance allows it.</text>
  </g>

  <path class="line" d="M776 260 H842"/>

  <!-- Candidate decision table -->
  <g transform="translate(860 150)">
    <text class="label" x="0" y="0">3. Decision rule selects one cut</text>
    <rect x="0" y="28" width="316" height="176" rx="8" fill="#ffffff" stroke="#d8dee5"/>
    <rect class="tableHead" x="0" y="28" width="316" height="32" rx="8"/>
    <text x="14" y="49" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">prefix</text>
    <text x="80" y="49" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">population</text>
    <text x="170" y="49" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">edge cut</text>
    <text x="248" y="49" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">decision</text>
    <line class="tableLine" x1="0" y1="92" x2="316" y2="92"/>
    <line class="tableLine" x1="0" y1="124" x2="316" y2="124"/>
    <g font-family="Consolas, monospace" font-size="13" fill="#17212b">
      <text x="14" y="81">2</text><text x="82" y="81">33 / 67</text><text x="174" y="81">2</text><text x="248" y="81">reject</text>
      <text x="14" y="113">3</text><text x="82" y="113">50 / 50</text><text x="174" y="113">3</text><text x="248" y="113">select</text>
      <text x="14" y="145">4</text><text x="82" y="145">67 / 33</text><text x="174" y="145">1</text><text x="248" y="145">reject</text>
    </g>
    <rect class="ok" x="16" y="156" width="284" height="34" rx="7"/>
    <text class="tiny" x="34" y="178">population feasibility before cut-quality tie rules</text>
  </g>

  <!-- Consequence -->
  <g transform="translate(104 450)">
    <text class="label" x="0" y="0">4. Selected cut becomes recursive workload and package evidence</text>
    <rect class="ok" x="0" y="24" width="500" height="104" rx="9"/>
    <text class="small" x="24" y="58">left child receives 3 units and recurses toward its district target</text>
    <text class="small" x="24" y="82">right child receives 3 units and recurses toward its district target</text>
    <text class="small" x="24" y="106">summary records edge cut, population deviation, tolerance, and parameter hash</text>
  </g>
  <g transform="translate(660 450)">
    <text class="label" x="0" y="0">Claim boundary</text>
    <rect class="warn" x="0" y="24" width="460" height="104" rx="9"/>
    <text class="small" x="24" y="58">This proves a deterministic construction path.</text>
    <text class="small" x="24" y="82">It does not prove global optimality or legal sufficiency.</text>
    <text class="small" x="24" y="106">Fiedler coordinates are algorithm evidence, not a legal proof.</text>
  </g>

  <rect x="74" y="702" width="1132" height="34" rx="10" fill="#26323d"/>
  <text x="100" y="724" font-family="Arial, sans-serif" font-size="15" fill="#fff">Reading rule: spectral partitioning uses graph geometry to order units, then the sweep table selects the balanced prefix cut that becomes the next recursive split.</text>
</svg>
