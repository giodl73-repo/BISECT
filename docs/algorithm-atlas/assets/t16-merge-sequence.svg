<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">T.16 deterministic merge sequence</title>
  <desc id="desc">Singleton units are merged into connected regions by deterministic adjacent-pair choices.</desc>
  <defs>
    <style>
      .bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.cell{fill:#f4f7fb;stroke:#6b7785;stroke-width:2}.a{fill:#dff3e6;stroke:#2f7d4c;stroke-width:2}.b{fill:#ffe7d1;stroke:#b86520;stroke-width:2}.c{fill:#eee8ff;stroke:#6650b8;stroke-width:2}.d{fill:#dbeafe;stroke:#2b5c9b;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker>
  </defs>
  <rect class="bg" width="960" height="430"/>
  <rect class="panel" x="35" y="50" width="260" height="300" rx="8"/><rect class="panel" x="350" y="50" width="260" height="300" rx="8"/><rect class="panel" x="665" y="50" width="260" height="300" rx="8"/>
  <text class="label" x="70" y="85">Step 0: singleton regions</text>
  <g transform="translate(82 120)"><rect class="cell" x="0" y="0" width="55" height="55"/><rect class="cell" x="55" y="0" width="55" height="55"/><rect class="cell" x="110" y="0" width="55" height="55"/><rect class="cell" x="0" y="55" width="55" height="55"/><rect class="cell" x="55" y="55" width="55" height="55"/><rect class="cell" x="110" y="55" width="55" height="55"/><rect class="cell" x="0" y="110" width="55" height="55"/><rect class="cell" x="55" y="110" width="55" height="55"/><rect class="cell" x="110" y="110" width="55" height="55"/></g>
  <text class="small" x="72" y="315">Each unit starts with its own id, population, and adjacency.</text>
  <text class="label" x="392" y="85">Step 1: eligible adjacent merges</text>
  <g transform="translate(397 120)"><rect class="a" x="0" y="0" width="55" height="55"/><rect class="a" x="55" y="0" width="55" height="55"/><rect class="cell" x="110" y="0" width="55" height="55"/><rect class="cell" x="0" y="55" width="55" height="55"/><rect class="b" x="55" y="55" width="55" height="55"/><rect class="b" x="110" y="55" width="55" height="55"/><rect class="cell" x="0" y="110" width="55" height="55"/><rect class="cell" x="55" y="110" width="55" height="55"/><rect class="cell" x="110" y="110" width="55" height="55"/></g>
  <text class="small" x="387" y="315">Pairs are scored, checked, and written as merge witnesses.</text>
  <text class="label" x="716" y="85">Step 2: larger connected regions</text>
  <g transform="translate(712 120)"><rect class="a" x="0" y="0" width="55" height="55"/><rect class="a" x="55" y="0" width="55" height="55"/><rect class="a" x="110" y="0" width="55" height="55"/><rect class="d" x="0" y="55" width="55" height="55"/><rect class="b" x="55" y="55" width="55" height="55"/><rect class="b" x="110" y="55" width="55" height="55"/><rect class="d" x="0" y="110" width="55" height="55"/><rect class="c" x="55" y="110" width="55" height="55"/><rect class="c" x="110" y="110" width="55" height="55"/></g>
  <text class="small" x="702" y="315">Repeat until k regions remain or no eligible merge exists.</text>
  <path class="arrow" d="M302 200 H345"/><path class="arrow" d="M617 200 H660"/>
</svg>
