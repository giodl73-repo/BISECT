<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Multiscale MCMC proposes coarse moves and checks fine-level validity</title>
  <desc id="desc">A teaching figure showing a fine assignment, a coarse-block candidate move, projection back to fine units, rebalance, and the resulting accept or reject status.</desc>
  <style>
    .bg{fill:#f7f5ef}
    .panel{fill:#fffdf8;stroke:#26323d;stroke-width:1.6}
    .card{fill:#fff;stroke:#c7d0da;stroke-width:1.2}
    .title{font:700 30px Arial,sans-serif;fill:#17212b}
    .label{font:700 17px Arial,sans-serif;fill:#17212b}
    .small{font:14px Arial,sans-serif;fill:#52616b}
    .tiny{font:12px Arial,sans-serif;fill:#52616b}
    .mono{font:12px Consolas,monospace;fill:#17212b}
    .cell{stroke:#fff;stroke-width:2}
    .d1{fill:#6ea0db}
    .d2{fill:#72b985}
    .d3{fill:#f0bc5e}
    .coarseA{fill:none;stroke:#245b99;stroke-width:4}
    .coarseB{fill:none;stroke:#25724d;stroke-width:4}
    .move{fill:#fff3cd;stroke:#c79300;stroke-width:1.5}
    .warn{fill:#fff1ed;stroke:#b6423c;stroke-width:1.5}
    .ok{fill:#eef8f0;stroke:#25724d;stroke-width:1.5}
    .rule{fill:#eef2ff;stroke:#5b61b6;stroke-width:1.5}
    .line{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .bad{stroke:#b6423c;stroke-width:4;stroke-linecap:round}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#596673"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="46" y="54">Multiscale MCMC: a coarse jump must survive fine-level validity</text>
  <text class="small" x="48" y="84">The coarse move is only a candidate. Projection and rebalance decide whether it becomes a reviewable fine assignment.</text>

  <rect class="panel" x="42" y="116" width="1196" height="554" rx="12"/>

  <!-- Fine plan -->
  <g transform="translate(76 150)">
    <text class="label" x="0" y="0">1. Current fine plan</text>
    <rect class="card" x="0" y="28" width="240" height="248" rx="9"/>
    <g transform="translate(42 66)">
      <rect class="cell d1" x="0" y="0" width="32" height="32"/><rect class="cell d1" x="34" y="0" width="32" height="32"/><rect class="cell d2" x="68" y="0" width="32" height="32"/><rect class="cell d2" x="102" y="0" width="32" height="32"/>
      <rect class="cell d1" x="0" y="34" width="32" height="32"/><rect class="cell d1" x="34" y="34" width="32" height="32"/><rect class="cell d2" x="68" y="34" width="32" height="32"/><rect class="cell d2" x="102" y="34" width="32" height="32"/>
      <rect class="cell d1" x="0" y="68" width="32" height="32"/><rect class="cell d3" x="34" y="68" width="32" height="32"/><rect class="cell d2" x="68" y="68" width="32" height="32"/><rect class="cell d2" x="102" y="68" width="32" height="32"/>
      <rect class="cell d3" x="0" y="102" width="32" height="32"/><rect class="cell d3" x="34" y="102" width="32" height="32"/><rect class="cell d3" x="68" y="102" width="32" height="32"/><rect class="cell d2" x="102" y="102" width="32" height="32"/>
      <rect class="coarseA" x="-3" y="-3" width="70" height="70" rx="5"/>
      <rect class="coarseB" x="65" y="-3" width="70" height="70" rx="5"/>
    </g>
    <text class="tiny" x="28" y="224">Fine units know district assignment.</text>
    <text class="tiny" x="28" y="244">Coarse blocks group several fine units.</text>
  </g>

  <path class="line" d="M326 274 H392"/>

  <!-- Coarse candidate -->
  <g transform="translate(410 150)">
    <text class="label" x="0" y="0">2. Candidate coarse move</text>
    <rect class="card" x="0" y="28" width="244" height="248" rx="9"/>
    <g transform="translate(44 70)">
      <rect class="d1" x="0" y="0" width="66" height="66" rx="5"/>
      <rect class="move" x="74" y="0" width="66" height="66" rx="5"/>
      <rect class="d3" x="0" y="74" width="66" height="66" rx="5"/>
      <rect class="d2" x="74" y="74" width="66" height="66" rx="5"/>
      <path d="M107 34 C86 42 74 54 66 74" fill="none" stroke="#c79300" stroke-width="5" marker-end="url(#arrow)"/>
    </g>
    <text class="tiny" x="24" y="224">Move block C1 toward district 1.</text>
    <text class="tiny" x="24" y="244">This is a proposal, not validity yet.</text>
  </g>

  <path class="line" d="M664 274 H730"/>

  <!-- Projection -->
  <g transform="translate(748 150)">
    <text class="label" x="0" y="0">3. Project to fine units</text>
    <rect class="card" x="0" y="28" width="240" height="248" rx="9"/>
    <g transform="translate(42 66)">
      <rect class="cell d1" x="0" y="0" width="32" height="32"/><rect class="cell d1" x="34" y="0" width="32" height="32"/><rect class="cell d1" x="68" y="0" width="32" height="32"/><rect class="cell d1" x="102" y="0" width="32" height="32"/>
      <rect class="cell d1" x="0" y="34" width="32" height="32"/><rect class="cell d1" x="34" y="34" width="32" height="32"/><rect class="cell d1" x="68" y="34" width="32" height="32"/><rect class="cell d1" x="102" y="34" width="32" height="32"/>
      <rect class="cell d1" x="0" y="68" width="32" height="32"/><rect class="cell d3" x="34" y="68" width="32" height="32"/><rect class="cell d2" x="68" y="68" width="32" height="32"/><rect class="cell d2" x="102" y="68" width="32" height="32"/>
      <rect class="cell d3" x="0" y="102" width="32" height="32"/><rect class="cell d3" x="34" y="102" width="32" height="32"/><rect class="cell d3" x="68" y="102" width="32" height="32"/><rect class="cell d2" x="102" y="102" width="32" height="32"/>
      <line class="bad" x1="68" y1="68" x2="134" y2="68"/>
    </g>
    <rect class="warn" x="24" y="210" width="192" height="42" rx="7"/>
    <text class="tiny" x="42" y="236">projection creates imbalance</text>
  </g>

  <path class="line" d="M998 274 H1060"/>

  <!-- Rebalance consequence -->
  <g transform="translate(1076 150)">
    <text class="label" x="0" y="0">4. Rebalance gate</text>
    <rect class="card" x="0" y="28" width="134" height="248" rx="9"/>
    <rect class="rule" x="16" y="58" width="102" height="44" rx="7"/>
    <text class="tiny" x="30" y="84">population?</text>
    <rect class="rule" x="16" y="114" width="102" height="44" rx="7"/>
    <text class="tiny" x="34" y="140">contiguity?</text>
    <rect class="rule" x="16" y="170" width="102" height="44" rx="7"/>
    <text class="tiny" x="36" y="196">acceptance?</text>
    <rect class="ok" x="16" y="224" width="102" height="34" rx="7"/>
    <text class="tiny" x="36" y="245">accept/reject</text>
  </g>

  <!-- Lower evidence -->
  <g transform="translate(90 472)">
    <text class="label" x="0" y="0">Output evidence</text>
    <rect class="ok" x="0" y="24" width="518" height="88" rx="9"/>
    <text class="small" x="24" y="58">move_type: coarse_projection</text>
    <text class="small" x="24" y="82">projection_status: imbalanced</text>
    <text class="small" x="284" y="58">rebalance_status: accepted/rejected</text>
    <text class="small" x="284" y="82">fine_tolerance and coarse_tolerance</text>
  </g>
  <g transform="translate(660 472)">
    <text class="label" x="0" y="0">Claim boundary</text>
    <rect class="warn" x="0" y="24" width="500" height="88" rx="9"/>
    <text class="small" x="24" y="58">This visual explains a heuristic move gate.</text>
    <text class="small" x="24" y="82">Sampler correctness still requires a target distribution and acceptance ratio.</text>
  </g>

  <rect x="74" y="702" width="1132" height="34" rx="10" fill="#26323d"/>
  <text x="100" y="724" font-family="Arial, sans-serif" font-size="15" fill="#fff">Reading rule: multiscale proposes big coarse moves, then projection and rebalance decide whether the fine plan remains valid enough to accept.</text>
</svg>
