<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Multiscale MCMC overview</title>
  <desc id="desc">A fine graph maps to a coarse hierarchy, alternates coarse and fine moves, then rebalances.</desc>
  <style>.bg{fill:#fbfbf8}.box{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.fine{fill:#dbeafe;stroke:#2b5c9b;stroke-width:2}.coarse{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.reb{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker></defs>
  <rect class="bg" width="960" height="360"/>
  <rect class="fine" x="75" y="105" width="150" height="95" rx="8"/><text class="label" x="111" y="140">fine graph</text><text class="small" x="116" y="162">tract units</text>
  <rect class="coarse" x="310" y="105" width="150" height="95" rx="8"/><text class="label" x="345" y="140">hierarchy</text><text class="small" x="338" y="162">coarse blocks</text>
  <rect class="box" x="545" y="105" width="150" height="95" rx="8"/><text class="label" x="585" y="140">moves</text><text class="small" x="585" y="162">coarse + fine</text>
  <rect class="reb" x="780" y="105" width="115" height="95" rx="8"/><text class="label" x="804" y="140">rebalance</text><text class="small" x="806" y="162">valid plan</text>
  <path class="arrow" d="M225 152 H310"/><path class="arrow" d="M460 152 H545"/><path class="arrow" d="M695 152 H780"/>
  <text class="small" x="270" y="282">Multiscale search makes larger jumps than single-scale local moves, then repairs or rebalances at the fine level.</text>
</svg>
