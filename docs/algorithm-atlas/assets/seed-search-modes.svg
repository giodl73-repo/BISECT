<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Seed search modes</title>
  <desc id="desc">A deterministic seed stream produces candidates; search mode decides which plan is selected.</desc>
  <style>.bg{fill:#fbfbf8}.box{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.seed{fill:#dbeafe;stroke:#2b5c9b;stroke-width:2}.cand{fill:#fff3cd;stroke:#c79300;stroke-width:2}.sel{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker></defs>
  <rect class="bg" width="960" height="360"/>
  <rect class="seed" x="70" y="120" width="150" height="85" rx="8"/><text class="label" x="108" y="153">seed stream</text><text class="small" x="102" y="175">content-derived</text>
  <rect class="cand" x="315" y="80" width="150" height="55" rx="8"/><text class="small" x="350" y="113">single</text>
  <rect class="cand" x="315" y="145" width="150" height="55" rx="8"/><text class="small" x="350" y="178">multi / min</text>
  <rect class="cand" x="315" y="210" width="150" height="55" rx="8"/><text class="small" x="337" y="243">percentile</text>
  <rect class="sel" x="600" y="120" width="170" height="85" rx="8"/><text class="label" x="642" y="153">selected plan</text><text class="small" x="635" y="175">claim depends on mode</text>
  <path class="arrow" d="M220 162 H315"/><path class="arrow" d="M465 107 C530 120 550 145 600 152"/><path class="arrow" d="M465 172 H600"/><path class="arrow" d="M465 237 C530 220 550 180 600 170"/>
</svg>
