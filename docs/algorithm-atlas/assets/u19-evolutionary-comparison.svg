<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">U.19 evolutionary comparison frontier selection</title>
  <desc id="desc">Evolutionary comparison creates repaired or valid offspring, scores objective trade-offs, selects a frontier index, and packages the selected plan with lineage.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#162033}
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#64748b;stroke-width:1.5;rx:8}
      .h{font-size:24px;font-weight:700}.sub{font-size:14px;fill:#475569}
      .label{font-size:14px;font-weight:700}.small{font-size:12px;fill:#475569}.tiny{font-size:10px;fill:#475569}
      .mono{font-size:11px;font-family:Consolas,monospace;fill:#162033}
      .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .planA{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.planB{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.child{fill:#fef3c7;stroke:#b45309;stroke-width:2}.repair{fill:#fff7ed;stroke:#f97316;stroke-width:1.8;rx:5}.bad{fill:#fee2e2;stroke:#dc2626;stroke-width:1.8;rx:5}.good{fill:#ecfdf5;stroke:#059669;stroke-width:1.8;rx:5}.front{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5;rx:5}.header{fill:#e2e8f0}
      .axis{stroke:#475569;stroke-width:2}.dot{stroke:#111827;stroke-width:1.3}
    </style>
  </defs>
  <rect width="1120" height="620" class="bg"/>
  <text x="32" y="44" class="h">U.19 Evolutionary Comparison</text>
  <text x="32" y="68" class="sub">U.19 compares objective trade-offs, keeps validity status visible, and exports one selected frontier entry for ordinary audit.</text>

  <rect x="32" y="96" width="306" height="252" class="panel"/>
  <text x="52" y="124" class="label">1. Crossover/mutation creates candidates</text>
  <text x="52" y="146" class="small">Children are not hidden when they need repair.</text>
  <rect x="66" y="176" width="76" height="54" class="planA" rx="6"/><text x="84" y="207" class="small">parent A</text>
  <rect x="186" y="176" width="76" height="54" class="planB" rx="6"/><text x="204" y="207" class="small">parent B</text>
  <path d="M142 204 H186" class="arrow"/>
  <rect x="126" y="256" width="76" height="54" class="child" rx="6"/><text x="145" y="287" class="small">child</text>
  <path d="M104 230 C112 252 126 260 150 268" class="arrow"/>
  <path d="M224 230 C216 252 202 260 178 268" class="arrow"/>
  <rect x="218" y="258" width="86" height="44" class="repair"/>
  <text x="232" y="276" class="tiny">repair/fallback</text><text x="236" y="292" class="tiny">status kept</text>

  <path d="M352 222 H400" class="arrow"/>

  <rect x="414" y="96" width="334" height="252" class="panel"/>
  <text x="434" y="124" class="label">2. Frontier rows preserve trade-offs</text>
  <text x="434" y="146" class="small">Selected does not mean best on every objective.</text>
  <rect x="440" y="172" width="276" height="28" class="header"/>
  <text x="452" y="191" class="mono">idx gen edge county validity selected</text>
  <rect x="440" y="200" width="276" height="32" class="front"/><text x="452" y="221" class="mono">0   4   130  13     valid</text>
  <rect x="440" y="236" width="276" height="32" class="good"/><text x="452" y="257" class="mono">1   5   137   8     valid     yes</text>
  <rect x="440" y="272" width="276" height="32" class="front"/><text x="452" y="293" class="mono">2   5   128  16     valid</text>
  <rect x="440" y="308" width="276" height="28" class="repair"/><text x="452" y="327" class="mono">3   6   126   9     repaired</text>

  <path d="M762 222 H810" class="arrow"/>

  <rect x="824" y="96" width="264" height="252" class="panel"/>
  <text x="844" y="124" class="label">3. Selection context is the evidence</text>
  <text x="844" y="146" class="small">The chosen point is a trade-off, not a scalar optimum.</text>
  <line x1="872" y1="302" x2="1040" y2="302" class="axis"/><line x1="872" y1="302" x2="872" y2="174" class="axis"/>
  <text x="922" y="326" class="tiny">county splits lower</text>
  <text x="820" y="190" class="tiny" transform="rotate(-90 820 190)">edge cut lower</text>
  <circle cx="946" cy="230" r="8" class="dot" fill="#bfdbfe"/><text x="956" y="226" class="tiny">0</text>
  <circle cx="980" cy="256" r="10" class="dot" fill="#86efac"/><text x="994" y="260" class="tiny">1 selected</text>
  <circle cx="930" cy="202" r="8" class="dot" fill="#bfdbfe"/><text x="940" y="198" class="tiny">2</text>
  <circle cx="1002" cy="196" r="8" class="dot" fill="#fed7aa"/><text x="1012" y="192" class="tiny">3 repaired</text>
  <rect x="852" y="316" width="204" height="24" class="good"/>
  <text x="868" y="333" class="small">selected_frontier_index: 1</text>

  <rect x="32" y="392" width="342" height="158" class="panel"/>
  <text x="52" y="420" class="label">Lineage fields</text>
  <rect x="62" y="450" width="278" height="74" class="front"/>
  <text x="82" y="474" class="mono">generation: 5</text>
  <text x="82" y="496" class="mono">objectives: edge=137, county=8</text>
  <text x="82" y="518" class="mono">validity: valid</text>

  <rect x="412" y="392" width="318" height="158" class="panel"/>
  <text x="432" y="420" class="label">Claim boundary</text>
  <rect x="446" y="458" width="110" height="44" class="good"/><text x="466" y="484" class="small">selected</text>
  <rect x="582" y="458" width="110" height="44" class="repair"/><text x="600" y="484" class="small">repaired</text>
  <text x="432" y="534" class="small">The frontier is a reproducible comparison, not proof of all Pareto-optimal plans.</text>

  <rect x="768" y="392" width="320" height="158" class="panel"/>
  <text x="788" y="420" class="label">Downstream consequence</text>
  <text x="788" y="444" class="small">Only the selected frontier entry becomes a full audit package.</text>
  <rect x="808" y="476" width="78" height="42" class="good"/><text x="828" y="501" class="small">RPLAN</text>
  <rect x="906" y="476" width="78" height="42" class="front"/><text x="923" y="501" class="small">RCTX</text>
  <rect x="1004" y="476" width="58" height="42" class="repair"/><text x="1017" y="501" class="small">audit</text>
  <path d="M886 498 H906" class="arrow"/><path d="M984 498 H1004" class="arrow"/>
  <text x="788" y="536" class="small">Reading rule: show the selected index and why it is a trade-off point.</text>
</svg>
