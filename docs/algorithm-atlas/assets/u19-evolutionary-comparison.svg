<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">U.19 evolutionary comparison overview</title>
  <desc id="desc">A population of plans evolves through crossover and mutation into a Pareto frontier, then a selected plan is audited.</desc>
  <style>.bg{fill:#fbfbf8}.box{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.evo{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.front{fill:#fff3cd;stroke:#c79300;stroke-width:2}.pkg{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker></defs>
  <rect class="bg" width="960" height="360"/>
  <rect class="box" x="65" y="105" width="150" height="95" rx="8"/><text class="label" x="105" y="140">plans</text><text class="small" x="92" y="162">population</text><text class="small" x="101" y="181">+ seeds</text>
  <rect class="evo" x="295" y="105" width="170" height="95" rx="8"/><text class="label" x="330" y="140">evolution</text><text class="small" x="325" y="162">crossover/mutate</text><text class="small" x="335" y="181">valid fallback</text>
  <rect class="front" x="545" y="105" width="160" height="95" rx="8"/><text class="label" x="575" y="140">frontier</text><text class="small" x="575" y="162">objectives</text><text class="small" x="575" y="181">validity status</text>
  <rect class="pkg" x="785" y="105" width="120" height="95" rx="8"/><text class="label" x="812" y="140">selected</text><text class="small" x="813" y="162">RPLAN</text><text class="small" x="817" y="181">package</text>
  <path class="arrow" d="M215 152 H295"/><path class="arrow" d="M465 152 H545"/><path class="arrow" d="M705 152 H785"/>
  <text class="small" x="275" y="280">U.19 compares trade-offs, then exports one chosen frontier entry through the ordinary audit path.</text>
</svg>
