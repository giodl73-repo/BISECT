<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">County-Sticky edge weights</title>
  <desc id="desc">Intra-county edges receive higher weights to discourage county splits.</desc>
  <style>.bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.county{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.node{fill:#fff;stroke:#2b5c9b;stroke-width:2}.thin{stroke:#778899;stroke-width:2}.thick{stroke:#2f7d4c;stroke-width:7}.cut{stroke:#b84a42;stroke-width:4;stroke-dasharray:6 5}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}</style>
  <rect class="bg" width="960" height="360"/><rect class="panel" x="70" y="55" width="820" height="250" rx="8"/>
  <rect class="county" x="130" y="105" width="270" height="150" rx="14"/><rect class="county" x="555" y="105" width="270" height="150" rx="14"/>
  <circle class="node" cx="195" cy="165" r="18"/><circle class="node" cx="295" cy="165" r="18"/><circle class="node" cx="665" cy="165" r="18"/><circle class="node" cx="765" cy="165" r="18"/>
  <line class="thick" x1="213" y1="165" x2="277" y2="165"/><line class="thin" x1="313" y1="165" x2="647" y2="165"/><line class="thick" x1="683" y1="165" x2="747" y2="165"/>
  <line class="cut" x1="465" y1="95" x2="465" y2="270"/>
  <text class="label" x="185" y="88">County A</text><text class="label" x="610" y="88">County B</text>
  <text class="small" x="150" y="285">Heavy intra-county edges make within-county cuts expensive; cross-county cuts are not automatically banned.</text>
</svg>
