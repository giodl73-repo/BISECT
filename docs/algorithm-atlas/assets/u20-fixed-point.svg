<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">U.20 fixed point verification</title>
  <desc id="desc">The manifest binds plan, context, certificate, transcript, method report, hashes, and verification status.</desc>
  <style>.bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.file{fill:#dbeafe;stroke:#2b5c9b;stroke-width:2}.manifest{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.ok{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.bad{fill:#ffe4e1;stroke:#b84a42;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.mono{font:12px Consolas,monospace;fill:#17212b}.line{stroke:#778899;stroke-width:2}</style>
  <rect class="bg" width="960" height="390"/><rect class="panel" x="45" y="45" width="410" height="285" rx="8"/><rect class="panel" x="520" y="45" width="365" height="285" rx="8"/>
  <text class="label" x="75" y="82">Package files</text>
  <rect class="file" x="75" y="110" width="135" height="40" rx="6"/><text class="small" x="105" y="135">plan.rplan</text>
  <rect class="file" x="75" y="165" width="135" height="40" rx="6"/><text class="small" x="102" y="190">context.rctx</text>
  <rect class="file" x="75" y="220" width="135" height="40" rx="6"/><text class="small" x="92" y="245">audit-certificate</text>
  <rect class="manifest" x="270" y="140" width="130" height="90" rx="8"/><text class="label" x="300" y="172">manifest</text><text class="small" x="300" y="194">hash binder</text><text class="small" x="300" y="212">source ids</text>
  <line class="line" x1="210" y1="130" x2="270" y2="165"/><line class="line" x1="210" y1="185" x2="270" y2="185"/><line class="line" x1="210" y1="240" x2="270" y2="205"/>
  <text class="label" x="555" y="82">Verifier checks</text>
  <text class="mono" x="555" y="122">plan hash matches manifest</text>
  <text class="mono" x="555" y="150">context hash matches certificate</text>
  <text class="mono" x="555" y="178">legal profile is declared</text>
  <text class="mono" x="555" y="206">algorithm_lineage is well-formed</text>
  <rect class="ok" x="555" y="245" width="135" height="45" rx="6"/><text class="small" x="585" y="272">accept</text>
  <rect class="bad" x="710" y="245" width="135" height="45" rx="6"/><text class="small" x="738" y="272">failure reason</text>
</svg>
