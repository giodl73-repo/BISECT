<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">Multiscale coarse and fine cycle</title>
  <desc id="desc">Fine units aggregate into coarse units, coarse proposals project back down, and rebalance restores validity.</desc>
  <style>.bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.fine{fill:#dbeafe;stroke:#2b5c9b;stroke-width:2}.coarse{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.reb{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker></defs>
  <rect class="bg" width="960" height="390"/><rect class="panel" x="45" y="45" width="850" height="285" rx="8"/>
  <text class="label" x="75" y="82">Coarse/fine cycle</text>
  <g transform="translate(95 125)"><rect class="fine" x="0" y="0" width="38" height="38"/><rect class="fine" x="38" y="0" width="38" height="38"/><rect class="fine" x="0" y="38" width="38" height="38"/><rect class="fine" x="38" y="38" width="38" height="38"/><rect class="fine" x="76" y="0" width="38" height="38"/><rect class="fine" x="114" y="0" width="38" height="38"/><rect class="fine" x="76" y="38" width="38" height="38"/><rect class="fine" x="114" y="38" width="38" height="38"/></g>
  <text class="small" x="95" y="235">fine units</text>
  <rect class="coarse" x="340" y="135" width="85" height="75" rx="8"/><rect class="coarse" x="440" y="135" width="85" height="75" rx="8"/><text class="small" x="355" y="177">coarse A</text><text class="small" x="455" y="177">coarse B</text>
  <rect class="reb" x="690" y="135" width="120" height="75" rx="8"/><text class="small" x="718" y="165">project +</text><text class="small" x="718" y="185">rebalance</text>
  <path class="arrow" d="M260 172 H340"/><path class="arrow" d="M525 172 H690"/><path class="arrow" d="M750 135 C720 85 270 85 170 125"/>
  <text class="small" x="305" y="285">A coarse proposal is useful only if the projected fine assignment can be made valid again.</text>
</svg>
