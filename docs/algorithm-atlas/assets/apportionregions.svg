<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">ApportionRegions prime-factor tree</title>
  <desc id="desc">Seat count factorization chooses the split tree.</desc>
  <style>.bg{fill:#fbfbf8}.node{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.leaf{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.line{stroke:#596673;stroke-width:2}</style>
  <rect class="bg" width="960" height="360"/>
  <text class="label" x="375" y="55">Example: k = 14 = 7 x 2</text>
  <rect class="node" x="410" y="80" width="120" height="45" rx="8"/><text class="small" x="450" y="108">14 seats</text>
  <line class="line" x1="470" y1="125" x2="160" y2="185"/><line class="line" x1="470" y1="125" x2="780" y2="185"/>
  <g><rect class="node" x="120" y="185" width="80" height="38" rx="8"/><rect class="node" x="230" y="185" width="80" height="38" rx="8"/><rect class="node" x="340" y="185" width="80" height="38" rx="8"/><rect class="node" x="450" y="185" width="80" height="38" rx="8"/><rect class="node" x="560" y="185" width="80" height="38" rx="8"/><rect class="node" x="670" y="185" width="80" height="38" rx="8"/><rect class="node" x="780" y="185" width="80" height="38" rx="8"/></g>
  <text class="small" x="145" y="209">2</text><text class="small" x="255" y="209">2</text><text class="small" x="365" y="209">2</text><text class="small" x="475" y="209">2</text><text class="small" x="585" y="209">2</text><text class="small" x="695" y="209">2</text><text class="small" x="805" y="209">2</text>
  <text class="small" x="335" y="285">Largest prime factor creates the top-level regional spine; each 2 then bisects.</text>
</svg>
