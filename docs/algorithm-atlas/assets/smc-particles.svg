<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">SMC particles and resampling</title>
  <desc id="desc">Particle weights determine systematic resampling maps across stages.</desc>
  <style>.bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.p{fill:#dbeafe;stroke:#2b5c9b;stroke-width:2}.hi{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.lo{fill:#ffe4e1;stroke:#b84a42;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.mono{font:12px Consolas,monospace;fill:#17212b}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker></defs>
  <rect class="bg" width="960" height="390"/><rect class="panel" x="45" y="45" width="385" height="285" rx="8"/><rect class="panel" x="530" y="45" width="360" height="285" rx="8"/>
  <text class="label" x="75" y="82">Before resampling</text>
  <rect class="hi" x="90" y="120" width="110" height="42" rx="6"/><text class="mono" x="110" y="146">p0 w=.50</text>
  <rect class="p" x="90" y="180" width="110" height="42" rx="6"/><text class="mono" x="110" y="206">p1 w=.30</text>
  <rect class="lo" x="90" y="240" width="110" height="42" rx="6"/><text class="mono" x="110" y="266">p2 w=.02</text>
  <text class="small" x="250" y="160">ESS below threshold</text><text class="small" x="250" y="180">triggers systematic</text><text class="small" x="250" y="200">resampling.</text>
  <text class="label" x="560" y="82">After resampling</text>
  <rect class="hi" x="590" y="120" width="125" height="42" rx="6"/><text class="mono" x="607" y="146">slot0 &lt;- p0</text>
  <rect class="hi" x="590" y="180" width="125" height="42" rx="6"/><text class="mono" x="607" y="206">slot1 &lt;- p0</text>
  <rect class="p" x="590" y="240" width="125" height="42" rx="6"/><text class="mono" x="607" y="266">slot2 &lt;- p1</text>
  <path class="arrow" d="M430 185 H530"/>
  <text class="small" x="740" y="160">The index map records genealogy.</text>
</svg>
