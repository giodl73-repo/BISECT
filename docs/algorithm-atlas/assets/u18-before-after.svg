<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">U.18 before and after local-search move</title>
  <desc id="desc">A boundary unit moves to a neighboring district only when population and contiguity remain valid and edge cut improves.</desc>
  <rect width="920" height="360" fill="#fbfbf7"/>
  <text x="34" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2933">One accepted boundary move</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#1f2933">
    <text x="72" y="84" font-weight="700">before</text>
    <text x="398" y="84" font-weight="700">checks</text>
    <text x="680" y="84" font-weight="700">after</text>
  </g>
  <g transform="translate(70 116)">
    <rect width="180" height="180" fill="#fff" stroke="#8795a1"/>
    <g stroke="#fff" stroke-width="3">
      <rect x="0" y="0" width="60" height="60" fill="#5b8def"/><rect x="60" y="0" width="60" height="60" fill="#5b8def"/><rect x="120" y="0" width="60" height="60" fill="#72b47e"/>
      <rect x="0" y="60" width="60" height="60" fill="#5b8def"/><rect x="60" y="60" width="60" height="60" fill="#72b47e"/><rect x="120" y="60" width="60" height="60" fill="#72b47e"/>
      <rect x="0" y="120" width="60" height="60" fill="#5b8def"/><rect x="60" y="120" width="60" height="60" fill="#5b8def"/><rect x="120" y="120" width="60" height="60" fill="#72b47e"/>
    </g>
    <text x="90" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#52616b">edge cut = 5</text>
  </g>
  <path d="M278 206 L346 206" stroke="#52616b" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(370 118)" font-family="Arial, sans-serif" font-size="13">
    <rect width="190" height="166" rx="8" fill="#fff" stroke="#8795a1"/>
    <text x="20" y="38" fill="#52616b">population within tolerance</text>
    <text x="20" y="70" fill="#52616b">source remains connected</text>
    <text x="20" y="102" fill="#52616b">target remains connected</text>
    <text x="20" y="134" fill="#547a45" font-weight="700">strictly lower edge cut</text>
  </g>
  <path d="M584 206 L650 206" stroke="#52616b" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(672 116)">
    <rect width="180" height="180" fill="#fff" stroke="#8795a1"/>
    <g stroke="#fff" stroke-width="3">
      <rect x="0" y="0" width="60" height="60" fill="#5b8def"/><rect x="60" y="0" width="60" height="60" fill="#5b8def"/><rect x="120" y="0" width="60" height="60" fill="#72b47e"/>
      <rect x="0" y="60" width="60" height="60" fill="#5b8def"/><rect x="60" y="60" width="60" height="60" fill="#5b8def"/><rect x="120" y="60" width="60" height="60" fill="#72b47e"/>
      <rect x="0" y="120" width="60" height="60" fill="#5b8def"/><rect x="60" y="120" width="60" height="60" fill="#5b8def"/><rect x="120" y="120" width="60" height="60" fill="#72b47e"/>
    </g>
    <text x="90" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#52616b">edge cut = 3</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#52616b"/>
    </marker>
  </defs>
</svg>
