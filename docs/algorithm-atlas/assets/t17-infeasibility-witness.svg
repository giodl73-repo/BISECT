<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">T.17 infeasibility witness</title>
  <desc id="desc">Valid flow writes final sidecars, infeasible flow writes a witness, and invalid extraction blocks export.</desc>
  <defs>
    <style>
      .bg{fill:#fbfbf8}.panel{fill:#fff;stroke:#2f3a45;stroke-width:1.5}.good{fill:#e4f5eb;stroke:#2f7d4c;stroke-width:2}.bad{fill:#ffe4e1;stroke:#b84a42;stroke-width:2}.warn{fill:#fff3cd;stroke:#c79300;stroke-width:2}.box{fill:#eef2ff;stroke:#5b61b6;stroke-width:2}.label{font:15px Arial,sans-serif;fill:#17212b}.small{font:12px Arial,sans-serif;fill:#3d4a56}.mono{font:12px Consolas,monospace;fill:#17212b}.arrow{stroke:#596673;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#596673"/></marker>
  </defs>
  <rect class="bg" width="960" height="430"/>
  <rect class="panel" x="45" y="45" width="870" height="330" rx="8"/>
  <text class="label" x="75" y="82">Status controls artifact behavior</text>
  <rect class="box" x="85" y="145" width="150" height="70" rx="8"/><text class="label" x="120" y="174">Flow model</text><text class="small" x="110" y="195">arcs + capacity</text>
  <rect class="good" x="340" y="80" width="170" height="70" rx="8"/><text class="label" x="403" y="110">valid</text><text class="small" x="370" y="131">write final sidecars</text>
  <rect class="warn" x="340" y="180" width="170" height="70" rx="8"/><text class="label" x="388" y="210">infeasible</text><text class="small" x="365" y="231">write witness only</text>
  <rect class="bad" x="340" y="280" width="170" height="70" rx="8"/><text class="label" x="395" y="310">invalid</text><text class="small" x="370" y="331">block final export</text>
  <path class="arrow" d="M235 175 C285 125 300 115 340 115"/><path class="arrow" d="M235 180 H340"/><path class="arrow" d="M235 188 C285 255 300 315 340 315"/>
  <rect class="panel" x="600" y="90" width="240" height="210" rx="8"/>
  <text class="label" x="625" y="124">Witness summary</text>
  <text class="mono" x="625" y="158">status: infeasible</text>
  <text class="mono" x="625" y="182">profile: capacity-h7c1</text>
  <text class="mono" x="625" y="206">target: 2 districts</text>
  <text class="mono" x="625" y="230">bounds: 95..105</text>
  <text class="mono" x="625" y="254">reason: no eligible fill</text>
  <path class="arrow" d="M510 215 H600"/>
  <text class="small" x="75" y="345">The witness is bounded to the declared staged model. It prevents an invalid assignment from masquerading as a final plan.</text>
</svg>
