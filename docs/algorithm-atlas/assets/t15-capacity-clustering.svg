<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">T.15 capacity constrained clustering</title>
  <desc id="desc">Seeds claim nearby units under capacity checks, then validation records status and repair lineage.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>text{font-family:Arial,Helvetica,sans-serif;fill:#172033}.h{font-size:22px;font-weight:700}.s{font-size:13px;fill:#475569}.box{fill:#fff;stroke:#94a3b8;stroke-width:1.5;rx:8}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}.edge{stroke:#64748b;stroke-width:2}.a{fill:#dbeafe;stroke:#2563eb}.b{fill:#dcfce7;stroke:#16a34a}.seed{stroke:#111827;stroke-width:4}</style>
  </defs>
  <rect width="900" height="360" fill="#f8fafc"/>
  <text x="32" y="42" class="h">T.15 Capacity-Constrained Clustering</text>
  <text x="32" y="66" class="s">Assign units to deterministic seeds while respecting population capacity.</text>
  <rect x="32" y="105" width="190" height="160" class="box"/>
  <line x1="65" y1="185" x2="100" y2="185" class="edge"/><line x1="100" y1="185" x2="135" y2="185" class="edge"/><line x1="135" y1="185" x2="170" y2="185" class="edge"/><line x1="170" y1="185" x2="205" y2="185" class="edge"/>
  <circle cx="65" cy="185" r="11" class="a seed"/><circle cx="100" cy="185" r="11" class="a"/><circle cx="135" cy="185" r="11" fill="#fff" stroke="#334155" stroke-width="1.5"/><circle cx="170" cy="185" r="11" class="b"/><circle cx="205" cy="185" r="11" class="b seed"/>
  <text x="70" y="292" class="s">farthest seeds</text>
  <path d="M235 185 L300 185" class="line"/>
  <rect x="315" y="105" width="180" height="160" class="box"/>
  <rect x="344" y="140" width="50" height="80" class="a" rx="6"/><rect x="416" y="140" width="50" height="80" class="b" rx="6"/><text x="349" y="235" class="s">pop</text><text x="419" y="235" class="s">pop</text>
  <text x="335" y="292" class="s">capacity-aware assignment</text>
  <path d="M510 185 L575 185" class="line"/>
  <rect x="590" y="105" width="130" height="160" class="box"/>
  <text x="615" y="150" class="s">status</text><text x="614" y="180" class="h">valid</text><text x="613" y="215" class="s">repair: none</text>
  <path d="M735 185 L800 185" class="line"/>
  <rect x="815" y="105" width="60" height="160" class="box b"/>
  <text x="825" y="166" class="s">RPLAN</text><text x="825" y="190" class="s">RCTX</text><text x="824" y="214" class="s">audit</text>
</svg>
