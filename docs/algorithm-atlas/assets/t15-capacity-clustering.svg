<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">T.15 capacity constrained clustering candidate and status flow</title>
  <desc id="desc">A capacity clustering example shows farthest-point seed candidates, eligible assignment choices, a capacity rejection, validation status, and exported package evidence.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#162033}
      .bg{fill:#f8fafc}
      .panel{fill:#fff;stroke:#64748b;stroke-width:1.5;rx:8}
      .h{font-size:24px;font-weight:700}
      .sub{font-size:14px;fill:#475569}
      .label{font-size:14px;font-weight:700}
      .small{font-size:12px;fill:#475569}
      .tiny{font-size:10px;fill:#475569}
      .edge{stroke:#94a3b8;stroke-width:2}
      .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .unit{fill:#f8fafc;stroke:#475569;stroke-width:1.5}
      .a{fill:#dbeafe;stroke:#2563eb;stroke-width:2}
      .b{fill:#dcfce7;stroke:#16a34a;stroke-width:2}
      .c{fill:#fef3c7;stroke:#b45309;stroke-width:2}
      .seed{stroke:#111827;stroke-width:4}
      .try{fill:#fff7ed;stroke:#f97316;stroke-width:2}
      .reject{fill:#fee2e2;stroke:#dc2626;stroke-width:2}
      .accept{fill:#dcfce7;stroke:#16a34a;stroke-width:2}
      .barBg{fill:#e2e8f0;stroke:#94a3b8}
      .barA{fill:#60a5fa}
      .barB{fill:#4ade80}
      .barC{fill:#fbbf24}
      .dash{stroke:#dc2626;stroke-width:2;stroke-dasharray:5 4}
      .chip{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5;rx:5}
      .good{fill:#ecfdf5;stroke:#059669;stroke-width:1.8;rx:6}
      .warn{fill:#fff7ed;stroke:#f97316;stroke-width:1.8;rx:6}
    </style>
  </defs>
  <rect width="1120" height="620" class="bg"/>
  <text x="32" y="44" class="h">T.15 Capacity-Constrained Clustering</text>
  <text x="32" y="68" class="sub">The construction grows from deterministic seeds, but every candidate assignment must fit a visible capacity budget.</text>

  <rect x="32" y="96" width="302" height="238" class="panel"/>
  <text x="52" y="124" class="label">1. Why these seeds are tried</text>
  <text x="52" y="146" class="small">Farthest-point choice spreads centers before growth.</text>
  <line x1="82" y1="188" x2="126" y2="166" class="edge"/>
  <line x1="126" y1="166" x2="174" y2="188" class="edge"/>
  <line x1="174" y1="188" x2="222" y2="166" class="edge"/>
  <line x1="222" y1="166" x2="274" y2="190" class="edge"/>
  <line x1="82" y1="188" x2="120" y2="256" class="edge"/>
  <line x1="120" y1="256" x2="178" y2="266" class="edge"/>
  <line x1="178" y1="266" x2="240" y2="250" class="edge"/>
  <line x1="240" y1="250" x2="274" y2="190" class="edge"/>
  <line x1="174" y1="188" x2="178" y2="266" class="edge"/>
  <circle cx="82" cy="188" r="18" class="a seed"/><text x="74" y="193" class="tiny">S1</text>
  <circle cx="126" cy="166" r="16" class="unit"/><text x="118" y="171" class="tiny">40</text>
  <circle cx="174" cy="188" r="16" class="unit"/><text x="166" y="193" class="tiny">35</text>
  <circle cx="222" cy="166" r="18" class="b seed"/><text x="214" y="171" class="tiny">S2</text>
  <circle cx="274" cy="190" r="18" class="c seed"/><text x="266" y="195" class="tiny">S3</text>
  <circle cx="120" cy="256" r="16" class="unit"/><text x="112" y="261" class="tiny">30</text>
  <circle cx="178" cy="266" r="16" class="unit"/><text x="170" y="271" class="tiny">28</text>
  <circle cx="240" cy="250" r="16" class="unit"/><text x="232" y="255" class="tiny">32</text>
  <rect x="52" y="292" width="250" height="24" class="chip"/>
  <text x="64" y="309" class="small">Seed order: stable first seed, then farthest units.</text>

  <path d="M348 214 H398" class="arrow"/>

  <rect x="412" y="96" width="314" height="238" class="panel"/>
  <text x="432" y="124" class="label">2. Assignment candidates are checked</text>
  <text x="432" y="146" class="small">Nearest seed is only accepted if capacity remains.</text>
  <rect x="432" y="168" width="74" height="44" class="a" rx="6"/><text x="448" y="194" class="small">A load 85</text>
  <rect x="522" y="168" width="74" height="44" class="try" rx="6"/><text x="543" y="194" class="small">+35</text>
  <rect x="612" y="168" width="74" height="44" class="reject" rx="6"/><text x="626" y="194" class="small">120 &gt; 100</text>
  <path d="M506 190 H522" class="arrow"/><path d="M596 190 H612" class="arrow"/>
  <line x1="432" y1="228" x2="684" y2="228" class="dash"/>
  <text x="444" y="246" class="small">Candidate A is geographically nearest but over capacity.</text>
  <rect x="432" y="264" width="74" height="44" class="b" rx="6"/><text x="450" y="290" class="small">B load 35</text>
  <rect x="522" y="264" width="74" height="44" class="accept" rx="6"/><text x="540" y="290" class="small">accept</text>
  <path d="M506 286 H522" class="arrow"/>
  <text x="616" y="286" class="small">Fallback candidate fits.</text>

  <path d="M740 214 H790" class="arrow"/>

  <rect x="804" y="96" width="284" height="238" class="panel"/>
  <text x="824" y="124" class="label">3. Capacity bars explain status</text>
  <text x="824" y="146" class="small">The ledger says why the plan is valid or repaired.</text>
  <text x="824" y="182" class="small">Cluster A</text>
  <rect x="900" y="166" width="132" height="20" class="barBg" rx="3"/><rect x="900" y="166" width="112" height="20" class="barA" rx="3"/><text x="1040" y="181" class="tiny">85/100</text>
  <text x="824" y="222" class="small">Cluster B</text>
  <rect x="900" y="206" width="132" height="20" class="barBg" rx="3"/><rect x="900" y="206" width="46" height="20" class="barB" rx="3"/><text x="1040" y="221" class="tiny">35/100</text>
  <text x="824" y="262" class="small">Cluster C</text>
  <rect x="900" y="246" width="132" height="20" class="barBg" rx="3"/><rect x="900" y="246" width="72" height="20" class="barC" rx="3"/><text x="1040" y="261" class="tiny">55/100</text>
  <rect x="824" y="290" width="228" height="26" class="good"/>
  <text x="838" y="308" class="small">status: valid if graph and tolerance pass</text>

  <rect x="32" y="374" width="504" height="184" class="panel"/>
  <text x="52" y="402" class="label">Decision ledger</text>
  <text x="52" y="426" class="small">The visual proof is the same story the package must preserve.</text>
  <text x="62" y="462" class="tiny">step</text><text x="114" y="462" class="tiny">unit</text><text x="172" y="462" class="tiny">nearest</text><text x="258" y="462" class="tiny">capacity test</text><text x="392" y="462" class="tiny">decision</text>
  <line x1="52" y1="472" x2="510" y2="472" class="edge"/>
  <text x="64" y="496" class="small">1</text><text x="112" y="496" class="small">45</text><text x="178" y="496" class="small">A</text><text x="258" y="496" class="small">0 + 45 &lt;= 100</text><text x="392" y="496" class="small">assign A</text>
  <text x="64" y="526" class="small">2</text><text x="112" y="526" class="small">40</text><text x="178" y="526" class="small">A</text><text x="258" y="526" class="small">45 + 40 &lt;= 100</text><text x="392" y="526" class="small">assign A</text>
  <text x="64" y="556" class="small">3</text><text x="112" y="556" class="small">35</text><text x="178" y="556" class="small">A</text><text x="258" y="556" class="small">85 + 35 &gt; 100</text><text x="392" y="556" class="small">try B</text>

  <rect x="584" y="374" width="504" height="184" class="panel"/>
  <text x="604" y="402" class="label">Downstream consequence</text>
  <text x="604" y="426" class="small">BISECT needs the seed choices and status lineage, not just final colors.</text>
  <rect x="614" y="456" width="112" height="60" class="good"/>
  <text x="638" y="481" class="small">RPLAN</text><text x="632" y="500" class="tiny">assignment</text>
  <rect x="748" y="456" width="112" height="60" class="chip"/>
  <text x="776" y="481" class="small">RCTX</text><text x="770" y="500" class="tiny">parameters</text>
  <rect x="882" y="456" width="112" height="60" class="warn"/>
  <text x="902" y="481" class="small">certificate</text><text x="904" y="500" class="tiny">status + repair</text>
  <path d="M726 486 H748" class="arrow"/><path d="M860 486 H882" class="arrow"/>
  <text x="604" y="542" class="small">Reading rule: if a near unit is rejected, the figure must show the failed capacity arithmetic and where the unit went next.</text>
</svg>
